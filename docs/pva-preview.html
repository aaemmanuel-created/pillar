// ─── ROUTINE ONBOARDING (Chat-Style) ───
function RoutineOnboardingView({ th, onComplete, existingRoutine }) {
  const [answers, setAnswers] = useState(existingRoutine || {});
  const [currentIdx, setCurrentIdx] = useState(0);
  const [chatMessages, setChatMessages] = useState([]);
  const [showingOptions, setShowingOptions] = useState(false);
  const [completed, setCompleted] = useState(false);
  const [uploadError, setUploadError] = useState("");
  const [showPasteBox, setShowPasteBox] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const chatEndRef = useRef(null);

  const handlePasteSubmit = function() {
    var text = pasteText.trim();
    if (!text) { setUploadError("Please paste your routine first."); return; }
    // Try JSON first (for PVA exports)
    try {
      var data = JSON.parse(text);
      var importedAnswers = data.answers || data;
      var validKeys = ROUTINE_QUESTIONS.map(function(q) { return q.id; });
      var matchCount = Object.keys(importedAnswers).filter(function(k) { return validKeys.indexOf(k) >= 0; }).length;
      if (matchCount > 0) {
        var routineData = { answers: importedAnswers, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(), imported: true };
        saveRoutineData(routineData);
        onComplete(importedAnswers);
        playCelebrate();
        return;
      }
    } catch (e) { /* not JSON, try plain text parsing */ }
    // For plain text: ALWAYS try free-form parser first — it handles task lists
    // much better than the questionnaire matcher, which only catches partial matches
    var directTasks = parseTextToTasks(text);
    if (directTasks) {
      var markerRoutine = { answers: { _freeform: true }, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(), imported: true, directTasks: directTasks };
      saveRoutineData(markerRoutine);
      onComplete({ _freeform: true, _directTasks: directTasks });
      playCelebrate();
      return;
    }
    setUploadError("Couldn\u2019t parse your text. Try one task per line, like:\n5:30am Wake up\n6:00am Morning prayer\n9:00 Work\n12:30 Lunch\n22:00 Bedtime");
  };

  // Get visible questions (respecting showIf)
  const visibleQuestions = useMemo(() => {
    return ROUTINE_QUESTIONS.filter(q => !q.showIf || q.showIf(answers));
  }, [answers]);

  // Scroll to bottom
  useEffect(() => {
    if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: "smooth" });
  }, [chatMessages, showingOptions]);

  // Show first question on mount
  useEffect(() => {
    const timer = setTimeout(() => {
      setChatMessages([{ type: "system", text: "Let\u2019s build your daily routine. I\u2019ll ask a few quick questions \u2014 just tap your answer." }]);
      setTimeout(() => {
        if (visibleQuestions.length > 0) {
          const q = visibleQuestions[0];
          const catInfo = ROUTINE_CATEGORIES[q.category];
          setChatMessages(prev => [...prev, { type: "category", label: catInfo.label, color: catInfo.color, emoji: catInfo.emoji }]);
          setTimeout(() => {
            setChatMessages(prev => [...prev, { type: "bot", emoji: q.emoji, text: q.question, qId: q.id }]);
            setShowingOptions(true);
          }, 400);
        }
      }, 600);
    }, 300);
    return () => clearTimeout(timer);
  }, []);

  const handleAnswer = (questionId, answer) => {
    const newAnswers = { ...answers, [questionId]: answer };
    setAnswers(newAnswers);
    setShowingOptions(false);

    // Add user answer as chat bubble
    setChatMessages(prev => [...prev, { type: "user", text: answer }]);

    // Recalculate visible questions with new answers
    const newVisible = ROUTINE_QUESTIONS.filter(q => !q.showIf || q.showIf(newAnswers));
    const currentQIdx = newVisible.findIndex(q => q.id === questionId);
    const nextIdx = currentQIdx + 1;

    if (nextIdx < newVisible.length) {
      const nextQ = newVisible[nextIdx];
      const currentQ = newVisible[currentQIdx];
      // Show category divider if category changed
      setTimeout(() => {
        if (nextQ.category !== currentQ.category) {
          const catInfo = ROUTINE_CATEGORIES[nextQ.category];
          setChatMessages(prev => [...prev, { type: "category", label: catInfo.label, color: catInfo.color, emoji: catInfo.emoji }]);
        }
        setTimeout(() => {
          setChatMessages(prev => [...prev, { type: "bot", emoji: nextQ.emoji, text: nextQ.question, qId: nextQ.id }]);
          setCurrentIdx(nextIdx);
          setShowingOptions(true);
        }, 400);
      }, 500);
    } else {
      // All questions answered
      setTimeout(() => {
        setChatMessages(prev => [...prev, { type: "system", text: "Your routine is set! You can update it anytime from the My Routine tab." }]);
        setCompleted(true);
        saveRoutineData({ answers: newAnswers, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      }, 600);
    }
  };

  const currentQuestion = visibleQuestions[currentIdx];
  const progress = visibleQuestions.length > 0 ? (Object.keys(answers).length / visibleQuestions.length) * 100 : 0;

  return (
    <div className="pva-fade-in" style={{ padding: "0 16px", paddingBottom: 140 }}>
      {/* Progress bar + Upload option */}
      <div style={{ padding: "16px 4px 8px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <span style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.12em" }}>BUILDING YOUR ROUTINE</span>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <button onClick={function() { setShowPasteBox(!showPasteBox); setUploadError(""); }}
              style={{ padding: "4px 10px", borderRadius: 12,
                border: "1px solid " + (showPasteBox ? th.blue + "40" : th.glassBorder),
                background: showPasteBox ? th.blueDim : th.glass,
                color: showPasteBox ? th.blue : th.mid,
                fontSize: 9, fontWeight: 700, cursor: "pointer",
                fontFamily: FONT, letterSpacing: "0.05em" }}>UPLOAD ROUTINE</button>
            <span style={{ fontSize: 9, fontWeight: 700, color: th.blue }}>{Math.round(progress)}%</span>
          </div>
        </div>
        {showPasteBox && (
          <div className="pva-fade-in" style={{ ...glassStyle(th), padding: 14, marginTop: 8, marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: th.mid, fontFamily: FONT, marginBottom: 8 }}>
              Paste your routine below. Use a simple format like "Wake up: 06:00" per line, or paste a PVA export:
            </div>
            <textarea value={pasteText} onChange={function(e) { setPasteText(e.target.value); setUploadError(""); }}
              placeholder={"5:30am Wake up\n6:00am Morning devotion\n6:45am Exercise\n9:00 Work / Deep focus\n12:30 Lunch\n6pm Family dinner\n9pm Bible reading\n10:30pm Bedtime"}
              style={{
                width: "100%", minHeight: 100, padding: 12, borderRadius: 12,
                border: "1px solid " + th.glassBorder, background: th.surface,
                color: th.text, fontSize: 11, fontFamily: FONT, resize: "vertical",
                outline: "none",
              }} />
            {uploadError && (
              <div style={{ padding: "6px 0", fontSize: 10, color: th.red, fontFamily: FONT }}>{uploadError}</div>
            )}
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button onClick={handlePasteSubmit}
                style={{ padding: "8px 18px", borderRadius: 14, border: "none",
                  background: th.blue, color: "#fff", fontSize: 11, fontWeight: 700,
                  cursor: "pointer", fontFamily: FONT }}>IMPORT</button>
              <button onClick={function() { setShowPasteBox(false); setPasteText(""); setUploadError(""); }}
                style={{ padding: "8px 18px", borderRadius: 14, border: "1px solid " + th.glassBorder,
                  background: th.glass, color: th.mid, fontSize: 11, fontWeight: 700,
                  cursor: "pointer", fontFamily: FONT }}>CANCEL</button>
            </div>
          </div>
        )}
        {!showPasteBox && uploadError && (
          <div style={{ padding: "8px 12px", borderRadius: 10, background: th.redDim, border: "1px solid " + th.red + "30",
            marginBottom: 8 }}>
            <span style={{ fontSize: 10, color: th.red, fontFamily: FONT }}>{uploadError}</span>
          </div>
        )}
        <div style={{ width: "100%", height: 4, borderRadius: 2, background: th.ghost, marginTop: showPasteBox ? 8 : 0 }}>
          <div style={{ width: progress + "%", height: "100%", borderRadius: 2, background: "linear-gradient(90deg, " + th.blue + ", #8B5CF6)", transition: "width 0.5s ease" }} />
        </div>
      </div>

      {/* Chat messages */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, paddingTop: 12 }}>
        {chatMessages.map(function(msg, i) {
          if (msg.type === "system") {
            return (
              <div key={i} style={{ textAlign: "center", padding: "12px 20px" }}>
                <div style={{ fontSize: 12, color: th.mid, lineHeight: 1.6, fontFamily: FONT }}>{msg.text}</div>
              </div>
            );
          }
          if (msg.type === "category") {
            return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "14px 0 4px", marginTop: 6 }}>
                <div style={{ flex: 1, height: 1, background: msg.color + "30" }} />
                <span style={{ fontSize: 9, fontWeight: 800, color: msg.color, letterSpacing: "0.15em", fontFamily: FONT }}>{msg.emoji} {msg.label}</span>
                <div style={{ flex: 1, height: 1, background: msg.color + "30" }} />
              </div>
            );
          }
          if (msg.type === "bot") {
            return (
              <div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-start", maxWidth: "85%" }}>
                <div style={{ width: 32, height: 32, borderRadius: 16, background: th.glass, border: "1px solid " + th.glassBorder,
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>{msg.emoji}</div>
                <div style={{ ...glassStyle(th), padding: "10px 14px", borderRadius: "4px 16px 16px 16px", maxWidth: "100%" }}>
                  <div style={{ fontSize: 13, color: th.text, lineHeight: 1.5, fontFamily: FONT }}>{msg.text}</div>
                </div>
              </div>
            );
          }
          if (msg.type === "user") {
            return (
              <div key={i} style={{ display: "flex", justifyContent: "flex-end" }}>
                <div style={{ padding: "10px 16px", borderRadius: "16px 4px 16px 16px",
                  background: "linear-gradient(135deg, " + th.blue + ", #6366F1)", maxWidth: "70%" }}>
                  <div style={{ fontSize: 13, color: "#fff", fontWeight: 600, fontFamily: FONT }}>{msg.text}</div>
                </div>
              </div>
            );
          }
          return null;
        })}

        {/* Current options */}
        {showingOptions && currentQuestion && (
          <div className="pva-fade-in" style={{ display: "flex", flexWrap: "wrap", gap: 8, padding: "6px 0 10px 40px" }}>
            {currentQuestion.options.map(function(opt) {
              return (
                <button key={opt} onClick={function() { handleAnswer(currentQuestion.id, opt); playTick(); }}
                  className="pva-card-hover" style={{
                    padding: "8px 16px", borderRadius: 20, border: "1px solid " + th.blue + "40",
                    background: th.blueDim, color: th.blue, fontSize: 12, fontWeight: 600,
                    cursor: "pointer", fontFamily: FONT, transition: "all 0.2s ease",
                  }}>{opt}</button>
              );
            })}
          </div>
        )}

        {/* Complete button */}
        {completed && (
          <div className="pva-fade-in" style={{ textAlign: "center", padding: "20px 0" }}>
            <button onClick={function() { onComplete(answers); playCelebrate(); }}
              className="pva-card-hover" style={{
                padding: "14px 32px", borderRadius: 24,
                background: "linear-gradient(135deg, " + th.blue + ", #6366F1)",
                border: "none", color: "#fff", fontSize: 14, fontWeight: 800,
                cursor: "pointer", fontFamily: FONT, letterSpacing: "0.05em",
                boxShadow: "0 4px 20px " + th.blue + "40",
              }}>START YOUR JOURNEY \u2192</button>
          </div>
        )}
        <div ref={chatEndRef} />
      </div>
    </div>
  );
}

// ─── GUIDED ROUTINE TIMER ───
function buildRoutineSteps(routine) {
  if (!routine || !routine.answers) return [];
  const a = routine.answers;
  const steps = [];
  // Morning
  if (a.wake_time) steps.push({ id: "wake", label: "Wake Up", emoji: "\uD83C\uDF05", duration: 5, category: "morning", time: a.wake_time });
  if (a.morning_devotion && a.morning_devotion !== "Not yet") {
    const mins = a.devotion_length ? parseInt(a.devotion_length) || 30 : 15;
    steps.push({ id: "devotion", label: "Morning Devotion", emoji: "\uD83D\uDCD6", duration: mins, category: "morning" });
  }
  if (a.morning_exercise && a.morning_exercise !== "No, but I want to") {
    const exLabel = a.exercise_type ? a.exercise_type : "Exercise";
    steps.push({ id: "exercise", label: exLabel, emoji: "\uD83D\uDCAA", duration: 30, category: "morning" });
  }
  if (a.breakfast_time && a.breakfast_time !== "I skip breakfast") {
    steps.push({ id: "breakfast", label: "Breakfast", emoji: "\uD83C\uDF73", duration: 20, category: "morning" });
  }
  // Work
  if (a.work_start) {
    const focusMins = a.focus_duration ? (parseInt(a.focus_duration) || 45) : 45;
    steps.push({ id: "work_focus", label: "Deep Focus Block", emoji: "\uD83C\uDFAF", duration: focusMins, category: "work", time: a.work_start });
  }
  // Afternoon
  if (a.lunch_time) steps.push({ id: "lunch", label: "Lunch", emoji: "\uD83E\uDD57", duration: 30, category: "afternoon", time: a.lunch_time });
  if (a.afternoon_break && a.afternoon_break !== "Rarely") {
    const breakLabel = a.break_activity || "Break";
    steps.push({ id: "break", label: breakLabel, emoji: "\u2615", duration: 15, category: "afternoon" });
  }
  // Evening
  if (a.dinner_time) steps.push({ id: "dinner", label: "Dinner", emoji: "\uD83C\uDF7D", duration: 30, category: "evening", time: a.dinner_time });
  if (a.wind_down) steps.push({ id: "wind_down", label: a.wind_down, emoji: "\uD83C\uDF19", duration: 20, category: "evening" });
  // Spiritual
  if (a.prayer_times) steps.push({ id: "prayer", label: "Prayer Time", emoji: "\uD83D\uDE4F", duration: 15, category: "spiritual" });
  if (a.bible_reading) steps.push({ id: "bible", label: "Bible Reading", emoji: "\uD83D\uDCDC", duration: 20, category: "spiritual" });
  if (a.bed_time) steps.push({ id: "bedtime", label: "Bedtime", emoji: "\uD83D\uDE34", duration: 5, category: "evening", time: a.bed_time });
  return steps;
}

function GuidedRoutineTimer({ th, onClose, onComplete }) {
  const routine = loadRoutine();
  const steps = useMemo(function() { return buildRoutineSteps(routine); }, []);
  const [currentStep, setCurrentStep] = useState(0);
  const [timeLeft, setTimeLeft] = useState(steps.length > 0 ? steps[0].duration * 60 : 0);
  const [isRunning, setIsRunning] = useState(false);
  const [completedSteps, setCompletedSteps] = useState([]);
  const [isPaused, setIsPaused] = useState(false);

  useEffect(function() {
    if (!isRunning || isPaused || timeLeft <= 0) return;
    const interval = setInterval(function() {
      setTimeLeft(function(t) {
        if (t <= 1) {
          clearInterval(interval);
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return function() { clearInterval(interval); };
  }, [isRunning, isPaused, timeLeft]);

  // Auto-advance when timer hits 0
  useEffect(function() {
    if (isRunning && timeLeft === 0 && currentStep < steps.length) {
      playTick();
      setCompletedSteps(function(prev) { return prev.concat([currentStep]); });
      if (currentStep < steps.length - 1) {
        setTimeout(function() {
          setCurrentStep(function(s) { return s + 1; });
          setTimeLeft(steps[currentStep + 1].duration * 60);
        }, 1500);
      } else {
        // All done
        setTimeout(function() {
          playCelebrate();
          if (onComplete) onComplete();
        }, 1000);
      }
    }
  }, [timeLeft, isRunning, currentStep]);

  const skipStep = function() {
    setCompletedSteps(function(prev) { return prev.concat([currentStep]); });
    if (currentStep < steps.length - 1) {
      setCurrentStep(currentStep + 1);
      setTimeLeft(steps[currentStep + 1].duration * 60);
    } else {
      if (onComplete) onComplete();
    }
  };

  const formatTime = function(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  };

  if (steps.length === 0) {
    return (
      <div style={{ position: "fixed", inset: 0, zIndex: 9998, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.6)", backdropFilter: "blur(12px)" }}>
        <div style={{ maxWidth: 340, width: "90%", padding: "30px 24px", borderRadius: 22, background: th === dark ? "#111827" : "#fff", border: "1px solid " + th.glassBorder, textAlign: "center" }}>
          <div style={{ fontSize: 30, marginBottom: 12 }}>{"\uD83D\uDE4F"}</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: th.text, marginBottom: 8 }}>No routine set up yet</div>
          <div style={{ fontSize: 12, color: th.mid, marginBottom: 16 }}>Set up your daily routine first in My Routine.</div>
          <button onClick={onClose} style={{ padding: "10px 24px", borderRadius: 10, border: "1px solid " + th.glassBorder, background: th.glass, color: th.text, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>CLOSE</button>
        </div>
      </div>
    );
  }

  const step = steps[currentStep];
  const cat = ROUTINE_CATEGORIES[step.category] || {};
  const progress = steps.length > 0 ? ((completedSteps.length) / steps.length) * 100 : 0;
  const pctOfStep = step.duration > 0 ? ((step.duration * 60 - timeLeft) / (step.duration * 60)) * 100 : 0;
  const allDone = completedSteps.length === steps.length;

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9998, display: "flex", flexDirection: "column", background: th === dark ? "linear-gradient(170deg, #0A0E1A 0%, #111827 100%)" : "linear-gradient(170deg, #F8FAFC 0%, #E2E8F0 100%)" }}>
      {/* Top bar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 20px" }}>
        <button onClick={onClose} style={{ padding: "8px 16px", borderRadius: 10, border: "1px solid " + th.glassBorder, background: th.glass, color: th.dim, fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>EXIT</button>
        <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em" }}>GUIDED ROUTINE</div>
        <div style={{ fontSize: 10, color: th.dim, fontFamily: FONT }}>{completedSteps.length}/{steps.length}</div>
      </div>

      {/* Overall progress */}
      <div style={{ padding: "0 20px", marginBottom: 20 }}>
        <div style={{ height: 4, borderRadius: 2, background: th.ghost, overflow: "hidden" }}>
          <div style={{ height: "100%", borderRadius: 2, width: progress + "%", background: "linear-gradient(90deg, #22C55E, #3B82F6)", transition: "width 0.6s ease" }} />
        </div>
      </div>

      {/* Step list (scrollable) */}
      <div style={{ padding: "0 20px", marginBottom: 16, maxHeight: 100, overflowY: "auto" }}>
        {steps.map(function(s, i) {
          const done = completedSteps.indexOf(i) >= 0;
          const active = i === currentStep;
          return (
            <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0", opacity: done ? 0.4 : active ? 1 : 0.6 }}>
              <span style={{ fontSize: 10, width: 14, textAlign: "center" }}>{done ? "\u2713" : active ? "\u25B6" : "\u25CB"}</span>
              <span style={{ fontSize: 10, color: active ? cat.color : th.dim, fontWeight: active ? 700 : 400, fontFamily: FONT }}>{s.emoji} {s.label}</span>
              <span style={{ fontSize: 9, color: th.ghost, marginLeft: "auto", fontFamily: FONT }}>{s.duration}m</span>
            </div>
          );
        })}
      </div>

      {/* Current step — main focus */}
      {!allDone && (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "0 30px" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>{step.emoji}</div>
          <div style={{ fontSize: 9, fontWeight: 700, color: cat.color, letterSpacing: "0.16em", marginBottom: 6 }}>{cat.label}</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: th.text, marginBottom: 4, textAlign: "center" }}>{step.label}</div>
          {step.time && <div style={{ fontSize: 11, color: th.dim, marginBottom: 16 }}>Scheduled: {step.time}</div>}

          {/* Timer circle */}
          <div style={{ position: "relative", width: 160, height: 160, marginBottom: 20 }}>
            <svg viewBox="0 0 160 160" width="160" height="160">
              <circle cx="80" cy="80" r="70" fill="none" stroke={th.ghost} strokeWidth="4" />
              <circle cx="80" cy="80" r="70" fill="none" stroke={cat.color} strokeWidth="4"
                strokeDasharray={2 * Math.PI * 70}
                strokeDashoffset={2 * Math.PI * 70 * (1 - pctOfStep / 100)}
                strokeLinecap="round"
                style={{ transition: "stroke-dashoffset 1s linear", transform: "rotate(-90deg)", transformOrigin: "center" }} />
            </svg>
            <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              <div style={{ fontSize: 36, fontWeight: 800, color: th.text, fontFamily: FONT }}>{formatTime(timeLeft)}</div>
              <div style={{ fontSize: 9, color: th.dim }}>{step.duration} min total</div>
            </div>
          </div>

          {/* Controls */}
          <div style={{ display: "flex", gap: 12 }}>
            {!isRunning ? (
              <button onClick={function() { setIsRunning(true); }} style={{
                padding: "14px 40px", borderRadius: 14, border: "none",
                background: cat.color, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
                boxShadow: "0 4px 20px " + cat.color + "40",
              }}>START</button>
            ) : (
              <React.Fragment>
                <button onClick={function() { setIsPaused(!isPaused); }} style={{
                  padding: "14px 24px", borderRadius: 14, border: "1px solid " + th.glassBorder,
                  background: th.glass, color: th.text, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
                }}>{isPaused ? "\u25B6 RESUME" : "\u23F8 PAUSE"}</button>
                <button onClick={skipStep} style={{
                  padding: "14px 24px", borderRadius: 14, border: "1px solid " + th.glassBorder,
                  background: th.glass, color: th.dim, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
                }}>SKIP \u203A</button>
              </React.Fragment>
            )}
          </div>
        </div>
      )}

      {/* Completion screen */}
      {allDone && (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "0 30px", textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>{"\u2728"}</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: th.text, marginBottom: 8 }}>Routine Complete!</div>
          <div style={{ fontSize: 12, color: th.mid, lineHeight: 1.7, marginBottom: 24 }}>
            Well done, faithful steward. You{"\u2019"}ve walked through your routine with intention.
          </div>
          <div style={{ fontSize: 11, color: "#8B5CF6", fontStyle: "italic", marginBottom: 24 }}>
            {"\u201C"}Whatever you do, work heartily, as for the Lord.{"\u201D"} {"\u2014"} Colossians 3:23
          </div>
          <button onClick={onClose} style={{
            padding: "14px 40px", borderRadius: 14, border: "none",
            background: "#22C55E", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
          }}>DONE</button>
        </div>
      )}
    </div>
  );
}

// ─── MY ROUTINE VIEW (Edit/View) ───
function MyRoutineView({ th, onBack, onRoutineChanged }) {
  const [routine, setRoutine] = useState(loadRoutine);
  const [editingId, setEditingId] = useState(null);
  const answers = (routine && routine.answers) || {};

  const handleUpdate = function(qId, newValue) {
    var newAnswers = Object.assign({}, answers);
    newAnswers[qId] = newValue;
    var newRoutine = Object.assign({}, routine, { answers: newAnswers, updatedAt: new Date().toISOString() });
    setRoutine(newRoutine);
    saveRoutineData(newRoutine);
    setEditingId(null);
    playTick();
    if (onRoutineChanged) onRoutineChanged(newRoutine);
  };

  const handleReset = function() {
    if (confirm("Reset your routine? You\u2019ll go through the setup again.")) {
      localStorage.removeItem(ROUTINE_STORAGE_KEY);
      setRoutine(null);
      if (onRoutineChanged) onRoutineChanged(null);
    }
  };

  const handleExport = function() {
    var blob = new Blob([JSON.stringify(routine, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "pva-routine.json";
    a.click();
    URL.revokeObjectURL(url);
  };

  const [importError, setImportError] = useState("");
  const [showImportBox, setShowImportBox] = useState(false);
  const [importText, setImportText] = useState("");

  const handleImportSubmit = function() {
    var text = importText.trim();
    if (!text) { setImportError("Please paste your routine first."); return; }
    // Try JSON first (PVA export format)
    try {
      var data = JSON.parse(text);
      var importedAnswers = data.answers || data;
      var validKeys = ROUTINE_QUESTIONS.map(function(q) { return q.id; });
      var matchCount = Object.keys(importedAnswers).filter(function(k) { return validKeys.indexOf(k) >= 0; }).length;
      if (matchCount > 0) {
        var newRoutine = { answers: importedAnswers, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(), imported: true };
        // If it also has directTasks, keep them
        if (data.directTasks) newRoutine.directTasks = data.directTasks;
        saveRoutineData(newRoutine);
        setRoutine(newRoutine);
        setImportError(""); setShowImportBox(false); setImportText("");
        playTick();
        if (onRoutineChanged) onRoutineChanged(newRoutine);
        return;
      }
    } catch (e) { /* not JSON */ }
    // For plain text: ALWAYS try free-form parser first — it handles task lists
    // much better than the questionnaire matcher, which only catches partial matches
    var directTasks = parseTextToTasks(text);
    if (directTasks) {
      var newRoutine = { answers: { _freeform: true }, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(), imported: true, directTasks: directTasks };
      saveRoutineData(newRoutine);
      setRoutine(newRoutine);
      setImportError(""); setShowImportBox(false); setImportText("");
      playTick();
      if (onRoutineChanged) onRoutineChanged(newRoutine);
      return;
    }
    setImportError("Couldn\u2019t parse your text. Try one task per line, like:\n5:30am Wake up\n6:00am Morning prayer\n9:00 Work\n22:00 Bedtime");
  };

  // Group questions by category
  var categories = ["morning", "work", "afternoon", "evening", "spiritual"];

  if (!routine || !routine.answers) {
    return (
      <div className="pva-fade-in" style={{ padding: "20px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
          <button onClick={onBack} style={{ padding: "6px 14px", borderRadius: 16, border: "1px solid " + th.glassBorder,
            background: th.glass, color: th.mid, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>BACK</button>
          <span style={{ fontSize: 14, fontWeight: 800, color: th.text, fontFamily: FONT }}>MY ROUTINE</span>
        </div>
        <div style={{ ...glassStyle(th), padding: 30, textAlign: "center" }}>
          <div style={{ fontSize: 13, color: th.mid, marginBottom: 16, fontFamily: FONT }}>No routine set up yet.</div>
          <div style={{ fontSize: 11, color: th.dim, fontFamily: FONT, marginBottom: 20 }}>Paste your tasks below to import your routine:</div>
          <textarea value={importText} onChange={function(e) { setImportText(e.target.value); setImportError(""); }}
            placeholder={"5:30am Wake up\n6:00am Morning devotion\n6:45am Exercise\n9:00 Work / Deep focus\n12:30 Lunch\n6pm Family dinner\n9pm Bible reading\n10:30pm Bedtime"}
            style={{
              width: "100%", minHeight: 120, padding: 12, borderRadius: 12,
              border: "1px solid " + th.glassBorder, background: th.surface,
              color: th.text, fontSize: 11, fontFamily: FONT, resize: "vertical",
              outline: "none", textAlign: "left",
            }} />
          {importError && (
            <div style={{ padding: "6px 0", fontSize: 10, color: th.red, fontFamily: FONT }}>{importError}</div>
          )}
          <button onClick={handleImportSubmit}
            style={{ marginTop: 12, padding: "10px 24px", borderRadius: 14, border: "none",
              background: th.blue, color: "#fff", fontSize: 11, fontWeight: 700,
              cursor: "pointer", fontFamily: FONT }}>IMPORT ROUTINE</button>
        </div>
      </div>
    );
  }

  return (
    <div className="pva-fade-in" style={{ padding: "0 16px", paddingBottom: 100 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, padding: "0 4px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={onBack} style={{ padding: "6px 14px", borderRadius: 16, border: "1px solid " + th.glassBorder,
            background: th.glass, color: th.mid, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>BACK</button>
          <span style={{ fontSize: 14, fontWeight: 800, color: th.text, fontFamily: FONT }}>MY ROUTINE</span>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={function() { setShowImportBox(!showImportBox); setImportError(""); }}
            style={{ padding: "6px 12px", borderRadius: 14,
              border: "1px solid " + (showImportBox ? th.blue : th.blue + "30"),
              background: showImportBox ? th.blue : th.blueDim,
              color: showImportBox ? "#fff" : th.blue,
              fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>IMPORT</button>
          <button onClick={handleExport}
            style={{ padding: "6px 12px", borderRadius: 14, border: "1px solid " + th.glassBorder,
              background: th.glass, color: th.mid, fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>EXPORT</button>
          <button onClick={handleReset} style={{ padding: "6px 12px", borderRadius: 14, border: "1px solid " + th.red + "30",
            background: th.redDim, color: th.red, fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>RESET</button>
        </div>
      </div>
      {showImportBox && (
        <div className="pva-fade-in" style={{ ...glassStyle(th), padding: 14, margin: "0 4px 12px" }}>
          <div style={{ fontSize: 10, color: th.mid, fontFamily: FONT, marginBottom: 8 }}>
            Paste your routine below (plain text or PVA export):
          </div>
          <textarea value={importText} onChange={function(e) { setImportText(e.target.value); setImportError(""); }}
            placeholder={"5:30am Wake up\n6:00am Morning devotion\n6:45am Exercise\n9:00 Work / Deep focus\n12:30 Lunch\n6pm Family dinner\n9pm Bible reading\n10:30pm Bedtime"}
            style={{
              width: "100%", minHeight: 100, padding: 12, borderRadius: 12,
              border: "1px solid " + th.glassBorder, background: th.surface,
              color: th.text, fontSize: 11, fontFamily: FONT, resize: "vertical",
              outline: "none",
            }} />
          {importError && (
            <div style={{ padding: "6px 0", fontSize: 10, color: th.red, fontFamily: FONT }}>{importError}</div>
          )}
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <button onClick={handleImportSubmit}
              style={{ padding: "8px 18px", borderRadius: 14, border: "none",
                background: th.blue, color: "#fff", fontSize: 11, fontWeight: 700,
                cursor: "pointer", fontFamily: FONT }}>IMPORT</button>
            <button onClick={function() { setShowImportBox(false); setImportText(""); setImportError(""); }}
              style={{ padding: "8px 18px", borderRadius: 14, border: "1px solid " + th.glassBorder,
                background: th.glass, color: th.mid, fontSize: 11, fontWeight: 700,
                cursor: "pointer", fontFamily: FONT }}>CANCEL</button>
          </div>
        </div>
      )}

      {/* ─── GENERATED DAILY SCHEDULE PREVIEW ─── */}
      {(function() {
        var preview = (routine && routine.directTasks) ? routine.directTasks : buildTasksFromRoutineAnswers(routine);
        if (!preview) return null;
        var allItems = [];
        ["person", "people", "process", "product"].forEach(function(k) {
          var pillar = preview[k];
          if (!pillar || !pillar.sections) return;
          pillar.sections.forEach(function(s) {
            s.tasks.forEach(function(t) {
              allItems.push({ time: s.time, label: t.label, pillar: pillar.label, id: t.id, xp: t.xp });
            });
          });
        });
        allItems.sort(function(a, b) {
          var ta = (a.time || "99:99").replace(/\u2013/g, "-").split("-")[0].trim();
          var tb = (b.time || "99:99").replace(/\u2013/g, "-").split("-")[0].trim();
          return ta.localeCompare(tb);
        });
        if (allItems.length === 0) return null;
        var getPeriod = function(item) {
          var t = (item.time || "99:99").replace(/\u2013/g, "-").split("-")[0].trim();
          var h = parseInt(t.split(":")[0]) || 99;
          if (h < 12) return "MORNING";
          if (h < 17) return "AFTERNOON";
          if (h < 99) return "EVENING";
          return "FLEXIBLE";
        };
        var groups = [];
        var currentGroup = null;
        allItems.forEach(function(item) {
          var period = getPeriod(item);
          if (!currentGroup || currentGroup.period !== period) {
            currentGroup = { period: period, items: [] };
            groups.push(currentGroup);
          }
          currentGroup.items.push(item);
        });
        var periodColors = { MORNING: "#F59E0B", AFTERNOON: "#22C55E", EVENING: "#8B5CF6", FLEXIBLE: th.blue };
        return (
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 4px 10px" }}>
              <span style={{ fontSize: 10, fontWeight: 800, color: th.text, letterSpacing: "0.14em", fontFamily: FONT }}>YOUR DAILY SCHEDULE</span>
              <div style={{ flex: 1, height: 1, background: th.glassBorder }} />
              <span style={{ fontSize: 9, color: th.dim, fontFamily: FONT }}>{allItems.length} tasks</span>
            </div>
            {groups.map(function(group) {
              var pColor = periodColors[group.period] || th.blue;
              return (
                <div key={group.period} style={{ marginBottom: 12 }}>
                  <div style={{
                    ...glassStyle(th), padding: "10px 16px", marginBottom: 4, borderRadius: 14,
                  }}>
                    <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.10em", color: th.text, fontFamily: FONT }}>{group.period}</span>
                  </div>
                  {group.items.map(function(item) {
                    return (
                      <div key={item.id} style={{
                        ...glassStyle(th), padding: "8px 16px", marginBottom: 2, borderRadius: 12,
                        display: "flex", alignItems: "center", justifyContent: "space-between",
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <span style={{ fontSize: 10, fontWeight: 700, color: pColor, minWidth: 85, fontFamily: FONT }}>{item.time || "\u2014"}</span>
                          <span style={{ fontSize: 11, fontWeight: 500, color: th.text, fontFamily: FONT }}>{item.label}</span>
                        </div>
                        <span style={{ fontSize: 9, color: th.dim, fontFamily: FONT }}>+{item.xp} XP</span>
                      </div>
                    );
                  })}
                </div>
              );
            })}
            <div style={{ padding: "8px 4px 0", fontSize: 9, color: th.dim, fontStyle: "italic", fontFamily: FONT }}>
              This schedule syncs to your Today's Tasks on the home screen.
            </div>
          </div>
        );
      })()}

      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 4px 10px" }}>
        <span style={{ fontSize: 10, fontWeight: 800, color: th.text, letterSpacing: "0.14em", fontFamily: FONT }}>ROUTINE SETTINGS</span>
        <div style={{ flex: 1, height: 1, background: th.glassBorder }} />
      </div>

      {categories.map(function(catKey) {
        var catInfo = ROUTINE_CATEGORIES[catKey];
        var catQuestions = ROUTINE_QUESTIONS.filter(function(q) {
          return q.category === catKey && (!q.showIf || q.showIf(answers));
        });
        var answeredQs = catQuestions.filter(function(q) { return answers[q.id]; });
        if (answeredQs.length === 0) return null;

        return (
          <div key={catKey} style={{ marginBottom: 20 }}>
            {/* Category header */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 4px 10px" }}>
              <span style={{ fontSize: 16 }}>{catInfo.emoji}</span>
              <span style={{ fontSize: 10, fontWeight: 800, color: catInfo.color, letterSpacing: "0.14em", fontFamily: FONT }}>{catInfo.label}</span>
              <div style={{ flex: 1, height: 1, background: catInfo.color + "20" }} />
            </div>

            {/* Items */}
            <div style={{ ...glassStyle(th), overflow: "hidden" }}>
              {answeredQs.map(function(q, idx) {
                var isEditing = editingId === q.id;
                return (
                  <div key={q.id} style={{
                    padding: "12px 16px", borderBottom: idx < answeredQs.length - 1 ? "1px solid " + th.glassBorder : "none",
                    cursor: "pointer", transition: "background 0.2s",
                  }} onClick={function() { setEditingId(isEditing ? null : q.id); }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontSize: 16 }}>{q.emoji}</span>
                        <span style={{ fontSize: 11, color: th.mid, fontFamily: FONT }}>{q.question}</span>
                      </div>
                      <span style={{ fontSize: 12, fontWeight: 700, color: th.blue, fontFamily: FONT }}>{answers[q.id] || "\u2014"}</span>
                    </div>
                    {/* Edit options */}
                    {isEditing && (
                      <div className="pva-fade-in" style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10, paddingLeft: 26 }}>
                        {q.options.map(function(opt) {
                          var isSelected = answers[q.id] === opt;
                          return (
                            <button key={opt} onClick={function(e) { e.stopPropagation(); handleUpdate(q.id, opt); }}
                              style={{
                                padding: "6px 12px", borderRadius: 16, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: FONT,
                                border: "1px solid " + (isSelected ? th.blue : th.glassBorder),
                                background: isSelected ? th.blue : th.glass,
                                color: isSelected ? "#fff" : th.mid,
                                transition: "all 0.2s",
                              }}>{opt}</button>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {routine.updatedAt && (
        <div style={{ textAlign: "center", padding: "10px 0", fontSize: 9, color: th.dim, fontFamily: FONT }}>
          Last updated: {new Date(routine.updatedAt).toLocaleDateString()}
        </div>
      )}
    </div>
  );
}

// ─── BOTTOM TAB BAR ───
function BottomTabBar({ view, setView, th }) {
  const tabs = [
    { id: "home", label: "HOME", icon: "\u2302" },
    { id: "weekly", label: "WEEKLY", icon: "\uD83D\uDCC5" },
    { id: "season", label: "SEASON", icon: "\uD83C\uDF3F" },
    { id: "settings", label: "SETTINGS", icon: "\u2699" },
  ];
  return (
    <div style={{
      position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 200,
      display: "flex", justifyContent: "space-around", alignItems: "center",
      padding: "8px 0 " + ("env(safe-area-inset-bottom, 8px)"),
      background: th.glass, backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)",
      borderTop: "1px solid " + th.glassBorder,
    }}>
      {tabs.map(function(tab) {
        const homeViews = ["home","category","routine","pva_glance","intercession","notes","prayer_journal","verse_mem","pets","guild","rewards","routine_onboarding","trends","testimony_wall"];
        const active = (view === tab.id) || (tab.id === "home" && homeViews.indexOf(view) !== -1);
        return (
          <div key={tab.id} onClick={function() { setView(tab.id); }} style={{
            display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
            cursor: "pointer", padding: "6px 16px", borderRadius: 12,
            transition: "all 0.2s ease",
          }}>
            <span style={{ fontSize: 18, color: active ? th.blue : th.dim, transition: "color 0.2s ease" }}>{tab.icon}</span>
            <span style={{ fontSize: 8, fontWeight: 700, letterSpacing: "0.1em", color: active ? th.blue : th.dim, fontFamily: FONT }}>{tab.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ─── MAIN APP ───
function PPPPApp() {
  const [profile, setProfile] = useState(loadProfile);
  const [themeMode, setThemeMode] = useState(function() {
    const auto = getAutoTheme();
    return auto || (profile?.theme || "light");
  });
  const [autoTheme, setAutoTheme] = useState(true);
  const [state, setState] = useState(loadState);
  const [view, setView] = useState(function() { return (loadRoutine() || loadProfile()) ? "home" : "routine_onboarding"; });
  const [hasRoutine, setHasRoutine] = useState(function() { return !!loadRoutine(); });
  const [testimonyMilestone, setTestimonyMilestone] = useState(null);

  // ─── FIREBASE AUTH STATE ───
  const [firebaseUser, setFirebaseUser] = useState(null);
  const [cloudSyncing, setCloudSyncing] = useState(false);
  const [cloudStatus, setCloudStatus] = useState(""); // "synced" | "syncing" | "error" | ""
  const syncTimerRef = useRef(null);

  // Listen for auth state changes
  useEffect(() => {
    if (!firebaseAuth) return;
    const unsub = firebaseAuth.onAuthStateChanged(async (user) => {
      setFirebaseUser(user);
      if (user) {
        // On sign in, try to load cloud data
        setCloudSyncing(true);
        setCloudStatus("syncing");
        try {
          const cloudData = await loadFromCloud(user.uid);
          if (cloudData && cloudData.pppp_state) {
            // Cloud has data — check if it's newer
            const localState = localStorage.getItem("pppp_state");
            const localParsed = localState ? JSON.parse(localState) : null;
            const cloudParsed = JSON.parse(cloudData.pppp_state);
            // Use cloud data if local has no totalXp or cloud has more
            if (!localParsed || (cloudParsed.totalXp || 0) >= (localParsed.totalXp || 0)) {
              restoreLocalData(cloudData);
              var restoredState = loadState();
              // If routine exists but no customTasks, rebuild tasks from routine
              if (!restoredState.customTasks) {
                var restoredRoutine = loadRoutine();
                var builtTasks = buildTasksFromRoutineAnswers(restoredRoutine);
                if (builtTasks) restoredState.customTasks = builtTasks;
              }
              setState(restoredState);
              setProfile(loadProfile());
              setHasRoutine(!!loadRoutine());
            } else {
              // Local is ahead — push to cloud
              await saveToCloud(user.uid, gatherLocalData());
            }
          } else {
            // No cloud data — push local to cloud
            await saveToCloud(user.uid, gatherLocalData());
          }
          setCloudStatus("synced");
        } catch (e) {
          console.warn("[PVA Cloud] Sync error:", e);
          setCloudStatus("error");
        }
        setCloudSyncing(false);
      } else {
        setCloudStatus("");
      }
    });
    return () => unsub();
  }, []);

  // Auto-sync to cloud on state changes (debounced)
  useEffect(() => {
    if (!firebaseUser) return;
    if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    syncTimerRef.current = setTimeout(() => {
      saveToCloud(firebaseUser.uid, gatherLocalData()).then(() => {
        setCloudStatus("synced");
      }).catch(() => {
        setCloudStatus("error");
      });
    }, 3000); // 3-second debounce
    return () => { if (syncTimerRef.current) clearTimeout(syncTimerRef.current); };
  }, [state, firebaseUser]);

  const handleSignIn = async () => {
    if (!firebaseAuth) return;
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await firebaseAuth.signInWithPopup(provider);
    } catch (e) {
      console.warn("[PVA Auth] Sign-in error:", e);
    }
  };

  const handleEmailAuth = async (email, password, isSignUp) => {
    if (!firebaseAuth) return { error: "Auth not available" };
    try {
      if (isSignUp) {
        await firebaseAuth.createUserWithEmailAndPassword(email, password);
      } else {
        await firebaseAuth.signInWithEmailAndPassword(email, password);
      }
      return { success: true };
    } catch (e) {
      var msg = e.code === "auth/user-not-found" ? "No account found. Try signing up." :
        e.code === "auth/wrong-password" ? "Incorrect password." :
        e.code === "auth/email-already-in-use" ? "Email already in use. Try signing in." :
        e.code === "auth/weak-password" ? "Password must be at least 6 characters." :
        e.code === "auth/invalid-email" ? "Invalid email address." :
        e.code === "auth/too-many-requests" ? "Too many attempts. Try again later." :
        "Sign-in failed. Please try again.";
      return { error: msg };
    }
  };

  const handleSignOut = async () => {
    try {
      await firebaseAuth.signOut();
      setCloudStatus("");
    } catch (e) {
      console.warn("[PVA Auth] Sign-out error:", e);
    }
  };

  const handleForceSync = async () => {
    if (!firebaseUser) return;
    setCloudSyncing(true);
    setCloudStatus("syncing");
    try {
      await saveToCloud(firebaseUser.uid, gatherLocalData());
      setCloudStatus("synced");
    } catch (e) {
      setCloudStatus("error");
    }
    setCloudSyncing(false);
  };

  // ─── ROUTINE ONBOARDING HANDLER ───
  const handleRoutineComplete = function(answers) {
    // When routine is completed/updated, rebuild tasks from the new answers
    var newTasks = null;
    // Check if free-form direct tasks were passed
    if (answers && answers._directTasks) {
      newTasks = answers._directTasks;
    } else {
      // Try loading the full routine object from localStorage first (most reliable)
      var routine = loadRoutine();
      // If routine has directTasks (free-form import), use those
      if (routine && routine.directTasks) {
        newTasks = routine.directTasks;
      } else {
        // If loadRoutine didn't find it (race condition), construct from the answers passed in
        if (!routine && answers) {
          routine = { answers: answers, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
          saveRoutineData(routine);
        }
        newTasks = buildTasksFromRoutineAnswers(routine);
      }
    }
    if (newTasks) {
      // Save routine-generated tasks as customTasks so they persist with the state
      setState(function(p) {
        var updated = Object.assign({}, p, { customTasks: newTasks });
        saveState(updated);
        return updated;
      });
    }
    setHasRoutine(true);
    setView("home");
  };

  const [activeCat, setActiveCat] = useState(null);
  const [celebrate, setCelebrate] = useState(false);
  const [showSummary, setShowSummary] = useState(false);
  const [showAccountability, setShowAccountability] = useState(false);
  const [showEveningReflection, setShowEveningReflection] = useState(false);
  const [showRoutineTimer, setShowRoutineTimer] = useState(false);
  const [focusMode, setFocusMode] = useState(false);
  const [undoToast, setUndoToast] = useState(null);
  const [taskOrder, setTaskOrder] = useState(() => {
    try { const saved = localStorage.getItem("pva_task_order"); return saved ? JSON.parse(saved) : null; } catch { return null; }
  });
  const [activeTaskAction, setActiveTaskAction] = useState(null); // { id, x, y } for long-press action bar
  const [editingHomeTask, setEditingHomeTask] = useState(null); // { id, label, time, catKey, secIdx, accent }
  const longPressRef = useRef(null);
  const [showAddTaskModal, setShowAddTaskModal] = useState(false);
  const [addTaskLabel, setAddTaskLabel] = useState("");
  const [addTaskPillar, setAddTaskPillar] = useState("person");
  const [addTaskTime, setAddTaskTime] = useState(() => {
    const now = new Date();
    const mins = Math.round(now.getMinutes() / 30) * 30;
    const h = String(now.getHours()).padStart(2, "0");
    const m = String(mins).padStart(2, "0");
    return `${h}:${m}`;
  });
  const [showWeeklyState, setShowWeeklyState] = useState(() => {
    try { const last = localStorage.getItem("pva_weekly_shown"); return last !== TODAY; } catch { return true; }
  });
  const [showMilestone, setShowMilestone] = useState(() => {
    const m = getMilestone(loadState().streak);
    if (!m) return null;
    try { const claimed = JSON.parse(localStorage.getItem("pva_milestones_claimed") || "[]"); return claimed.includes(m.days) ? null : m; } catch { return m; }
  });
  const [showWeeklyReport, setShowWeeklyReport] = useState(() => {
    try {
      const lastShown = localStorage.getItem("pva_weekly_report_shown");
      const now = new Date();
      const day = now.getDay(); // 0 = Sunday
      if (day !== 0) return false;
      return lastShown !== TODAY;
    } catch { return false; }
  });
  const [showPrestige, setShowPrestige] = useState(false);
  const [showLoginBonus, setShowLoginBonus] = useState(function() {
    try {
      var lastShown = localStorage.getItem("pva_login_bonus_shown");
      return lastShown !== TODAY;
    } catch { return true; }
  });

  // If no profile, show onboarding (with sign-in)
  if (!profile) {
    return <OnboardingScreen onComplete={(p) => setProfile(p)} onCustomTasks={(ct) => setState(prev => ({ ...prev, customTasks: ct }))} onSignIn={handleSignIn} onEmailAuth={handleEmailAuth} firebaseUser={firebaseUser} />;
  }

  const userName = profile.name;
  const scrollRef = useRef(null);

  const th = themeMode === "dark" ? dark : light;
  const isDark = themeMode === "dark";
  const colors = catColors(th);

  // ─── AUTO-SYNC ROUTINE → CUSTOM TASKS ───
  // On load and whenever hasRoutine changes, if there's a routine in localStorage
  // but no customTasks in state, rebuild and persist them immediately.
  useEffect(function() {
    if (!state.customTasks) {
      var routine = loadRoutine();
      if (routine) {
        // Handle both questionnaire-based and free-form imported routines
        var newTasks = routine.directTasks || buildTasksFromRoutineAnswers(routine);
        if (newTasks) {
          setState(function(p) {
            if (p.customTasks) return p; // another update beat us
            var updated = Object.assign({}, p, { customTasks: newTasks });
            saveState(updated);
            return updated;
          });
        }
      }
    }
  }, [hasRoutine]);

  // Task management — use routine-generated tasks if available, else defaults
  const tasks = useMemo(function() {
    if (state.customTasks) return state.customTasks;
    var routine = loadRoutine();
    var routineTasks = buildTasksFromRoutineAnswers(routine);
    return routineTasks || DEFAULT_TASKS;
  }, [state.customTasks, hasRoutine]);

  const getEditableTasks = () => {
    return state.customTasks ? JSON.parse(JSON.stringify(state.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
  };

  const onEditTask = useCallback((catKey, secIdx, taskId, newLabel) => {
    setState(p => {
      const t = p.customTasks ? JSON.parse(JSON.stringify(p.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
      const sec = t[catKey]?.sections?.[secIdx];
      if (sec) { const task = sec.tasks.find(tk => tk.id === taskId); if (task) task.label = newLabel; }
      return { ...p, customTasks: t };
    });
  }, []);

  const onDeleteTask = useCallback((catKey, secIdx, taskId) => {
    setState(p => {
      const t = p.customTasks ? JSON.parse(JSON.stringify(p.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
      const sec = t[catKey]?.sections?.[secIdx];
      if (sec) sec.tasks = sec.tasks.filter(tk => tk.id !== taskId);
      const nc = { ...p.completed }; delete nc[taskId];
      return { ...p, customTasks: t, completed: nc };
    });
  }, []);

  const onAddTask = useCallback((catKey, secIdx, label) => {
    setState(p => {
      const t = p.customTasks ? JSON.parse(JSON.stringify(p.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
      const sec = t[catKey]?.sections?.[secIdx];
      if (sec) {
        const id = `custom_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
        sec.tasks.push({ id, label, xp: 15, type: "check", hasNotes: true, notesPlaceholder: "Notes..." });
      }
      return { ...p, customTasks: t };
    });
  }, []);

  // Save state and update today's history entry
  const lastSavedPct = useRef(-1);
  useEffect(() => {
    // Update history for today without triggering re-render loop
    if (dayPct !== lastSavedPct.current) {
      lastSavedPct.current = dayPct;
      setState(p => {
        const hist = [...(p.history || [])];
        if (hist.length > 0 && hist[hist.length - 1]?.date === TODAY) {
          const catKeys2 = ["person", "people", "process", "product"];
          const cats = {};
          catKeys2.forEach(k => {
            const a = (tasks[k]?.sections || []).flatMap(s => s.tasks);
            const d = a.filter(t => t.type === "check" ? p.completed?.[t.id] : (p.counters?.[t.id]||0) >= (t.target||1)).length;
            cats[k] = a.length > 0 ? Math.round((d / a.length) * 100) : 0;
          });
          hist[hist.length - 1] = { ...hist[hist.length - 1], pct: dayPct, xp: dayXp, cats };
          const newState = { ...p, history: hist };
          saveState(newState);
          return newState;
        }
        return p;
      });
    }
  }, [dayPct, dayXp, tasks]);
  useEffect(() => {
    if (autoTheme) {
      const id = setInterval(() => setThemeMode(getAutoTheme()), 60000);
      setThemeMode(getAutoTheme());
      return () => clearInterval(id);
    }
  }, [autoTheme]);

  // Check for testimony milestones
  useEffect(() => {
    try {
      const testimonies = JSON.parse(localStorage.getItem("pva_testimonies") || "[]");
      const savedIds = testimonies.map(t => t.id);
      const firstUnsaved = TESTIMONY_MILESTONES.find(function(m) {
        if (savedIds.indexOf(m.id) !== -1) return false;
        return m.check(state);
      });
      if (firstUnsaved && !testimonyMilestone) {
        setTestimonyMilestone(firstUnsaved);
      }
    } catch (e) {}
  }, [state]);

  const streakMult = getMult(state.streak);
  const prestigeMult = 1 + ((state.prestige || 0) * 0.1);
  const mult = streakMult * prestigeMult;
  const { cur: level, nxt: nextLevel, idx: levelIdx } = getLevel(state.totalXp);

  const all = Object.values(tasks).flatMap(c => c.sections.flatMap(s => s.tasks));
  const doneN = all.filter(t => t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1)).length;
  const dayPct = all.length > 0 ? Math.round((doneN / all.length) * 100) : 0;
  const dayXp = all.reduce((s, t) => {
    const d = t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1);
    return s + (d ? Math.round(t.xp * mult) : 0);
  }, 0);

  // Per-category completion
  const getCatPct = (catKey) => {
    const a = tasks[catKey].sections.flatMap(s => s.tasks);
    const d = a.filter(t => t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1)).length;
    return a.length > 0 ? Math.round((d / a.length) * 100) : 0;
  };

  // Daily Challenge
  const dailyChallenge = getDailyChallenge(TODAY);
  const toggleChallenge = () => {
    setState(p => {
      const was = p.challengeCompleted; const dx = Math.round(dailyChallenge.xp * prestigeMult);
      if (!was) playTick();
      return { ...p, challengeCompleted: !was, xp: p.xp + (was ? -dx : dx), totalXp: p.totalXp + (was ? -dx : dx) };
    });
  };

  const toastTimerRef = useRef(null);
  useEffect(() => {
    return () => { if (toastTimerRef.current) clearTimeout(toastTimerRef.current); };
  }, []);

  const toggleHomeTask = useCallback((id, e) => {
    const allT = Object.values(tasks).flatMap(c => c.sections.flatMap(s => s.tasks));
    const t = allT.find(x => x.id === id);
    const was = state.completed[id];
    const dx = t ? Math.round(t.xp * mult) : 0;

    setState(p => {
      const t = allT.find(x => x.id === id); const was = p.completed[id];
      const dx = t ? Math.round(t.xp * mult) : 0;
      if (!was) { playTick(); spawnParticles(e); if (navigator.vibrate) navigator.vibrate(30); }
      var updated = { ...p, completed: { ...p.completed, [id]: !was }, xp: p.xp + (was ? -dx : dx), totalXp: p.totalXp + (was ? -dx : dx) };
      saveState(updated);
      return updated;
    });

    // Show undo toast
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    setUndoToast({ id, label: t?.label || "Task", xp: dx, wasCompleted: was });
    toastTimerRef.current = setTimeout(() => setUndoToast(null), 4000);
  }, [tasks, mult, state.completed]);

  // Weekly Boss
  const boss = getWeeklyBoss(TODAY);

  // HP system
  useEffect(() => {
    const hour = new Date().getHours();
    if (hour >= 23 && dayPct < 100 && !state._hpDrained) {
      const missedXp = all.reduce((s, t) => {
        const d = t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1);
        return s + (d ? 0 : t.xp);
      }, 0);
      const totalXpPool = all.reduce((s,t) => s + t.xp, 0);
      const hpLoss = totalXpPool > 0 ? Math.round((missedXp / totalXpPool) * 30) : 0;
      if (hpLoss > 0) {
        playDamage();
        setState(p => {
          const newHp = Math.max(0, p.hp - hpLoss);
          return { ...p, hp: newHp, _hpDrained: true, redemptionMode: newHp <= 0 };
        });
      }
    }
    if (dayPct >= 80 && !state._hpRegen) {
      setState(p => ({ ...p, hp: Math.min(HP_MAX, p.hp + 10), _hpRegen: true }));
    }
  }, [dayPct, state._hpDrained, state._hpRegen]);

  useEffect(() => {
    if (dayPct === 100 && !celebrate) { setCelebrate(true); playCelebrate(); }
  }, [dayPct]);

  const toggleTheme = () => { setAutoTheme(false); setThemeMode(m => m === "dark" ? "light" : "dark"); };

  const openCategory = (catKey) => { setActiveCat(catKey); setView("category"); };
  const goHome = () => { setView("home"); setActiveCat(null); };

  const catKeys = ["person", "people", "process", "product"];

  return (
    <div style={{ minHeight: "100vh", fontFamily: FONT, color: th.text, background: th.grad, transition: "background 0.5s ease", position: "relative", overflow: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap');

        .pppp-tiles::-webkit-scrollbar { display: none; }
        .pppp-tiles { -ms-overflow-style: none; scrollbar-width: none; }

        /* Smooth global transitions */
        * { -webkit-tap-highlight-color: transparent; }

        /* Aurora animated background — time-of-day adaptive */
        .pva-aurora {
          position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0;
          animation: auroraShift 25s ease-in-out infinite alternate, auroraDrift 40s ease-in-out infinite;
        }
        .pva-aurora-morning {
          background: radial-gradient(ellipse 70% 50% at 25% 5%, rgba(251,191,36,0.12) 0%, transparent 55%),
                      radial-gradient(ellipse 60% 45% at 75% 15%, rgba(249,115,22,0.09) 0%, transparent 55%),
                      radial-gradient(ellipse 50% 60% at 50% 85%, rgba(59,130,246,0.06) 0%, transparent 55%);
        }
        .pva-aurora-afternoon {
          background: radial-gradient(ellipse 65% 45% at 30% 10%, rgba(59,130,246,0.10) 0%, transparent 55%),
                      radial-gradient(ellipse 55% 50% at 70% 20%, rgba(34,197,94,0.08) 0%, transparent 55%),
                      radial-gradient(ellipse 45% 55% at 45% 80%, rgba(245,158,11,0.06) 0%, transparent 55%);
        }
        .pva-aurora-evening {
          background: radial-gradient(ellipse 70% 50% at 20% 8%, rgba(124,58,237,0.12) 0%, transparent 55%),
                      radial-gradient(ellipse 55% 45% at 80% 15%, rgba(59,130,246,0.09) 0%, transparent 55%),
                      radial-gradient(ellipse 50% 60% at 50% 90%, rgba(99,102,241,0.07) 0%, transparent 55%);
        }
        .pva-aurora-night {
          background: radial-gradient(ellipse 65% 50% at 25% 10%, rgba(99,102,241,0.10) 0%, transparent 55%),
                      radial-gradient(ellipse 50% 45% at 75% 20%, rgba(124,58,237,0.08) 0%, transparent 55%),
                      radial-gradient(ellipse 55% 55% at 40% 85%, rgba(30,64,175,0.06) 0%, transparent 55%);
        }
        @keyframes auroraShift {
          0% { opacity: 0.7; transform: scale(1) translateY(0); }
          25% { opacity: 0.95; transform: scale(1.03) translateY(-6px); }
          50% { opacity: 1; transform: scale(1.05) translateY(-10px); }
          75% { opacity: 0.85; transform: scale(1.02) translateY(4px); }
          100% { opacity: 0.75; transform: scale(0.98) translateY(6px); }
        }
        @keyframes auroraDrift {
          0% { filter: hue-rotate(0deg) brightness(1); }
          25% { filter: hue-rotate(4deg) brightness(1.02); }
          50% { filter: hue-rotate(8deg) brightness(1.04); }
          75% { filter: hue-rotate(4deg) brightness(1.02); }
          100% { filter: hue-rotate(0deg) brightness(1); }
        }

        /* Fade-in-up page transition */
        .pva-fade-in {
          animation: pvaFadeInUp 0.45s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes pvaFadeInUp {
          from { opacity: 0; transform: translateY(18px) scale(0.98); }
          to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Staggered entry for child elements */
        .pva-stagger > * {
          opacity: 0;
          animation: pvaStaggerIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }
        .pva-stagger > *:nth-child(1) { animation-delay: 0.03s; }
        .pva-stagger > *:nth-child(2) { animation-delay: 0.07s; }
        .pva-stagger > *:nth-child(3) { animation-delay: 0.11s; }
        .pva-stagger > *:nth-child(4) { animation-delay: 0.15s; }
        .pva-stagger > *:nth-child(5) { animation-delay: 0.19s; }
        .pva-stagger > *:nth-child(6) { animation-delay: 0.23s; }
        .pva-stagger > *:nth-child(7) { animation-delay: 0.27s; }
        .pva-stagger > *:nth-child(8) { animation-delay: 0.31s; }

        .pva-number-pop {

        }

        /* Card hover lift — enhanced */
        .pva-card-hover {

        /* Subtle breathing for active states */

          50% { box-shadow: 0 6px 24px rgba(59,130,246,0.4), 0 0 8px rgba(59,130,246,0.6); }
        }
