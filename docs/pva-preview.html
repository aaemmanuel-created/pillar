                    <div>
                      <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em" }}>EVENING REFLECTION</div>
                      <div style={{ fontSize: 11, fontWeight: 400, color: state.dayRating ? "#22C55E" : th.mid, marginTop: 2 }}>
                        {state.dayRating ? "Rated " + state.dayRating + "/5 \u2014 " + ["Tough","Below par","Okay","Good","Excellent"][state.dayRating - 1] : "How did today go? Tap to reflect."}
                      </div>
                    </div>
                  </div>
                  <span style={{ fontSize: 14, color: state.dayRating ? "#22C55E" : th.dim }}>{state.dayRating ? "\u2713" : "\u203A"}</span>
                </div>
              </div>

              {/* 4. My Testimonies */}
              <div onClick={function() { setView("testimony_wall"); }} style={{
                ...glassStyle(th), padding: "14px 16px", marginBottom: 14, cursor: "pointer",
                display: "flex", alignItems: "center", justifyContent: "space-between",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div>
                    <div style={{ fontSize: 9, fontWeight: 700, color: th.text, fontFamily: FONT, letterSpacing: "0.14em" }}>MY TESTIMONIES</div>
                    <div style={{ fontSize: 9, color: th.dim, fontFamily: FONT, marginTop: 2 }}>Rev 12:11 — They overcame by their testimony</div>
                  </div>
                </div>
                <span style={{ fontSize: 12, color: th.dim }}>{"\u203A"}</span>
              </div>

              {/* 5. Grace Day */}
              <div style={{ marginBottom: 14 }}>
                <GraceDayCard state={state} setState={setState} th={th} />
              </div>

              {/* 6. Next Milestone */}
              {(() => {
                const next = getNextMilestone(state.streak);
                if (!next) return null;
                const progress = next.days > 0 ? Math.min(100, Math.round((state.streak / next.days) * 100)) : 0;
                return (
                  <div style={{ ...glassStyle(th), padding: "12px 16px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <span style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", fontFamily: FONT }}>NEXT MILESTONE</span>
                      <span style={{ fontSize: 10, fontWeight: 700, color: next.color, fontFamily: FONT }}>{next.title} {"\u2014"} {next.days}d</span>
                    </div>
                    <div style={{ height: 4, borderRadius: 2, background: th.ghost, overflow: "hidden" }}>
                      <div style={{ height: "100%", borderRadius: 2, width: progress + "%", background: "linear-gradient(90deg, " + next.color + "88, " + next.color + ")", transition: "width 0.6s ease" }} />
                    </div>
                    <div style={{ fontSize: 9, color: th.dim, marginTop: 5, fontFamily: FONT }}>{next.days - state.streak} days to go {"\u00B7"} +{next.xpBonus} XP reward</div>
                  </div>
                );
              })()}

            </div>

            <SectionDivider th={th} />

            {/* XP Bar */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                <span style={{ fontSize: 10, color: th.dim }}>{state.totalXp} XP</span>
                <span style={{ fontSize: 10, color: th.ghost }}>{nextLevel ? `${nextLevel.xp} \u2192 ${nextLevel.name}` : "MAX"}</span>
              </div>
              <Bar value={state.totalXp - level.xp} max={nextLevel ? nextLevel.xp - level.xp : 1} color={th.blue} h={3} th={th} />
            </div>

            {/* Temple */}
            <div style={{ ...glassStyle(th), padding: "16px 12px 8px", margin: "0 20px 20px" }}>
              <TempleVisual stage={levelIdx} th={th} />
            </div>

              </>
            )}

            {/* Footer */}
            <div style={{ textAlign: "center", padding: "20px 0 32px" }}>
              <div style={{ fontSize: 9, color: th.ghost, letterSpacing: "0.24em" }}>PVA {"\u00B7"} {TODAY}</div>
            </div>
          </div>
        )}

        {/* ─── CATEGORY VIEW ─── */}
        {view === "category" && activeCat && tasks[activeCat] && (
          <TaskView catKey={activeCat} cat={tasks[activeCat]} state={state} setState={setState}
            mult={mult} th={th} colors={colors} onBack={goHome}
            onEditTask={onEditTask} onDeleteTask={onDeleteTask} onAddTask={onAddTask}
            dailyChallenge={dailyChallenge} challengeCompleted={state.challengeCompleted}
            toggleChallenge={toggleChallenge} />
        )}

        {/* ─── PVA GLANCE VIEW ─── */}
        {view === "pva_glance" && (
          <PVAGlanceView state={state} dayPct={dayPct} th={th} onBack={goHome} />
        )}

        {/* ─── INTERCESSION VIEW ─── */}
        {view === "intercession" && (
          <IntercessionView state={state} setState={setState} th={th} onBack={goHome} />
        )}

        {/* ─── NOTES VIEW ─── */}
        {view === "notes" && (
          <NotesView th={th} onBack={goHome} />
        )}

        {/* ─── SETTINGS VIEW ─── */}
        {view === "settings" && (
          <SettingsView profile={profile} onSave={(p) => { saveProfile(p); setProfile(p); }}
            onBack={goHome} th={th}
            firebaseUser={firebaseUser} cloudStatus={cloudStatus} cloudSyncing={cloudSyncing}
            onSignIn={handleSignIn} onSignOut={handleSignOut} onForceSync={handleForceSync} />
        )}

        {/* ─── WEEKLY VIEW ─── */}
        {view === "weekly" && (
          <div style={{ padding: "20px" }}>
            <WeeklyView state={state} th={th} tasks={tasks} boss={boss} />
          </div>
        )}

        {/* ─── SEASON VIEW ─── */}
        {view === "season" && (
          <SeasonView state={state} tasks={tasks} dayPct={dayPct} th={th} onBack={(v) => { if (v) setView(v); else goHome(); }} />
        )}

        {/* ─── TRENDS VIEW ─── */}
        {view === "trends" && (
          <TrendsView state={state} tasks={tasks} th={th} onBack={goHome} />
        )}

        {/* ─── PRAYER JOURNAL VIEW ─── */}
        {view === "prayer_journal" && (
          <PrayerJournalView th={th} onBack={goHome} />
        )}

        {/* ─── VERSE MEMORISATION VIEW ─── */}
        {view === "verse_mem" && (
          <VerseMemView th={th} onBack={goHome} />
        )}

        {/* ─── PETS & MOUNTS VIEW ─── */}
        {view === "pets" && (
          <PetsView state={state} th={th} onBack={goHome} />
        )}

        {/* ─── GUILD VIEW ─── */}
        {view === "guild" && (
          <GuildView state={state} th={th} dayPct={dayPct} onBack={goHome} />
        )}

        {/* ─── REWARDS SHOP VIEW ─── */}
        {view === "rewards" && (
          <RewardsShopView state={state} th={th} onBack={goHome} />
        )}

        {/* ─── ROUTINE ONBOARDING VIEW ─── */}
        {view === "routine_onboarding" && (
          <RoutineOnboardingView th={th} onComplete={handleRoutineComplete} existingRoutine={null} />
        )}

        {/* ─── MY ROUTINE VIEW ─── */}
        {view === "routine" && (
          <MyRoutineView th={th} onBack={goHome} onRoutineChanged={function(newRoutine) {
            if (newRoutine) {
              var newTasks = newRoutine.directTasks || buildTasksFromRoutineAnswers(newRoutine);
              if (newTasks) {
                setState(function(p) {
                  var updated = Object.assign({}, p, { customTasks: newTasks });
                  saveState(updated);
                  return updated;
                });
              }
              setHasRoutine(true);
            } else {
              // Routine was reset — revert to default tasks
              setState(function(p) {
                var s = Object.assign({}, p);
                delete s.customTasks;
                saveState(s);
                return s;
              });
              setHasRoutine(false);
            }
          }} />
        )}

        {/* ─── TESTIMONY WALL VIEW ─── */}
        {view === "testimony_wall" && (
          <TestimonyWall th={th} onBack={goHome} />
        )}

        {/* Bottom tab bar removed */}

        {/* ─── TESTIMONY MODAL ─── */}
        {testimonyMilestone && (
          <TestimonyModal milestone={testimonyMilestone} onSave={function(text) {
            try {
              const testimonies = JSON.parse(localStorage.getItem("pva_testimonies") || "[]");
              testimonies.push({ id: testimonyMilestone.id, text: text, date: TODAY, shared: false });
              localStorage.setItem("pva_testimonies", JSON.stringify(testimonies));
            } catch (e) {}
            setTestimonyMilestone(null);
          }} onSkip={function() { setTestimonyMilestone(null); }} th={th} />
        )}

        {/* FAB removed — add task via header button */}

        {/* ─── ADD TASK MODAL ─── */}
        {showAddTaskModal && (
          <div style={{
            position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
            background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "flex-end",
            zIndex: 1000, backdropFilter: "blur(4px)", WebkitBackdropFilter: "blur(4px)",
          }} onClick={function() { setShowAddTaskModal(false); }}>
            <div onClick={function(e) { e.stopPropagation(); }} style={{
              width: "100%", background: th.bg, borderRadius: "28px 28px 0 0",
              padding: "24px 20px 32px", boxShadow: "0 -4px 24px rgba(0,0,0,0.12)",
            }}>
              <div style={{ fontSize: 14, fontWeight: 800, color: th.text, marginBottom: 16, fontFamily: FONT }}>ADD TASK</div>
              <div style={{ marginBottom: 16 }}>
                <label style={{ fontSize: 11, fontWeight: 700, color: th.dim, letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>TASK LABEL</label>
                <input type="text" placeholder="What's the task?" value={addTaskLabel} onChange={function(e) { setAddTaskLabel(e.target.value); }}
                  style={{
                    width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${th.glassBorder}`,
                    background: th.surface, color: th.text, fontSize: 12, fontFamily: FONT,
                    outline: "none", boxSizing: "border-box",
                  }} />
              </div>
              <div style={{ marginBottom: 16 }}>
                <label style={{ fontSize: 11, fontWeight: 700, color: th.dim, letterSpacing: "0.06em", display: "block", marginBottom: 6 }}>TIME (optional)</label>
                <input type="time" value={addTaskTime} onChange={function(e) { setAddTaskTime(e.target.value); }}
                  style={{
                    width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${th.glassBorder}`,
                    background: th.surface, color: th.text, fontSize: 12, fontFamily: FONT,
                    outline: "none", boxSizing: "border-box",
                  }} />
              </div>
              <div style={{ marginBottom: 20 }}>
                <label style={{ fontSize: 11, fontWeight: 700, color: th.dim, letterSpacing: "0.06em", display: "block", marginBottom: 10 }}>PILLAR</label>
                <div style={{ display: "flex", gap: 10 }}>
                  {["person", "people", "process", "product"].map(function(k) {
                    const c = colors[k];
                    return (
                      <button key={k} onClick={function() { setAddTaskPillar(k); }} style={{
                        width: 40, height: 40, borderRadius: 12, border: `2px solid ${addTaskPillar === k ? c.accent : th.glassBorder}`,
                        background: addTaskPillar === k ? `${c.accent}20` : "transparent",
                        cursor: "pointer", transition: "all 0.2s ease",
                      }}>
                        <span style={{ fontSize: 16 }}>{k === "person" ? "\uD83D\uDC4B" : k === "people" ? "\uD83D\uDC6B" : k === "process" ? "\u2699\uFE0F" : "\uD83C\uDFF7"}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
              <button onClick={function() {
                if (addTaskLabel.trim()) {
                  onAddTask(addTaskPillar, 0, addTaskLabel);
                  setShowAddTaskModal(false);
                  setAddTaskLabel("");
                  setAddTaskPillar("person");
                }
              }} style={{
                width: "100%", padding: "12px", borderRadius: 12, border: "none",
                background: th.blue, color: "#fff", fontWeight: 700, fontSize: 12,
                cursor: "pointer", fontFamily: FONT, transition: "all 0.2s ease",
              }} onMouseEnter={function(e) { e.target.style.opacity = "0.9"; }}
              onMouseLeave={function(e) { e.target.style.opacity = "1"; }}>
                ADD TASK
              </button>
            </div>
          </div>
        )}

        {/* ─── UNDO TOAST ─── */}
        {undoToast && (
          <div className="pva-toast-in" style={{
            position: "fixed", bottom: 110, left: "50%", transform: "translateX(-50%)",
            zIndex: 200, maxWidth: 320, padding: "14px 16px", borderRadius: 12,
            ...glassStyle(th),
            boxShadow: "0 8px 32px rgba(0,0,0,0.15)",
            display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
          }}>
            <div style={{ flex: 1, fontSize: 12, color: th.text, fontFamily: FONT }}>
              Task {undoToast.wasCompleted ? "unchecked" : "completed"} <span style={{ fontWeight: 700, color: th.blue }}>+{undoToast.xp}XP</span>
            </div>
            <button onClick={function() { toggleHomeTask(undoToast.id, null); setUndoToast(null); }} style={{
              padding: "6px 12px", borderRadius: 8, border: `1px solid ${th.glassBorder}`,
              background: "transparent", color: th.blue, fontSize: 11, fontWeight: 700,
              cursor: "pointer", fontFamily: FONT, transition: "all 0.2s ease",
            }} onMouseEnter={function(e) { e.target.style.background = `${th.blue}20`; }}
            onMouseLeave={function(e) { e.target.style.background = "transparent"; }}>
              UNDO
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PPPPApp />);
</script></body></html>
