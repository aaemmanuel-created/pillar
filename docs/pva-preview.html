        </svg>
      </div>

      {/* Summary stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
        {[
          { label: "COMPLETION", value: `${dayPct}%`, color: dayPct >= 80 ? "#22C55E" : dayPct >= 50 ? th.gold : th.red },
          { label: "STREAK", value: `${state.streak}d`, color: th.red },

            <span style={{ fontSize: 8, opacity: 0.8 }}>{"\u271A"}</span>

          <span style={{ fontSize: 8, fontWeight: 800, color: th.scripture, letterSpacing: "0.2em" }}>FOUNDATIONAL SCRIPTURE</span>
        </div>
        <div style={{
          padding: "14px 18px", borderRadius: 12,

          borderLeft: `2px solid ${th.scripture}`,

// ─── NETWORK OF INTERCESSION ───
const DEFAULT_PRAYER_PEOPLE = [
  { id: "p1", name: "Family", prayed: false },
  { id: "p2", name: "Church leaders", prayed: false },
  { id: "p3", name: "Friends", prayed: false },
  { id: "p4", name: "Colleagues", prayed: false },
  { id: "p5", name: "Nations", prayed: false },
];

function IntercessionView({ state, setState, th, onBack }) {
  const isDark = th === dark;
  const people = state.prayerPeople || DEFAULT_PRAYER_PEOPLE;
  const prayedCount = people.filter(p => p.prayed).length;

  const togglePrayed = (id) => {
    setState(p => {
      const pp = (p.prayerPeople || DEFAULT_PRAYER_PEOPLE).map(person =>
        person.id === id ? { ...person, prayed: !person.prayed } : person
      );
      return { ...p, prayerPeople: pp };
    });
  };

  const addPerson = (name) => {
    setState(p => {
      const pp = [...(p.prayerPeople || DEFAULT_PRAYER_PEOPLE)];
      pp.push({ id: `pray_${Date.now()}`, name, prayed: false });
      return { ...p, prayerPeople: pp };
    });
  };

  const removePerson = (id) => {
    setState(p => {
      const pp = (p.prayerPeople || DEFAULT_PRAYER_PEOPLE).filter(person => person.id !== id);
      return { ...p, prayerPeople: pp };
    });
  };

  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");

  // Network visualization: place people in a circle
  const centerX = 150, centerY = 120, radius = 80;

  return (
    <div style={{ padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 24 }}>
        <button onClick={onBack} style={{
          width: 40, height: 40, borderRadius: 12, cursor: "pointer",
          border: `1px solid ${th.glassBorder}`, background: th.glass,
          color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: FONT, backdropFilter: "blur(20px)",
        }}>{"\u2190"}</button>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>Network of Intercession</div>
          <div style={{ fontSize: 10, color: th.dim }}>{prayedCount}/{people.length} prayed for today</div>
        </div>
      </div>

      {/* Network visualization */}
      <div style={{ ...glassStyle(th), padding: "20px 16px", marginBottom: 16 }}>
        <svg viewBox="0 0 300 240" width="100%" style={{ display: "block", margin: "0 auto", maxWidth: 400 }}>
          <defs>
            <radialGradient id="prayerGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor={th.gold} stopOpacity="0.4" />
              <stop offset="100%" stopColor={th.gold} stopOpacity="0" />
            </radialGradient>
          </defs>
          {/* Center cross */}
          <line x1={centerX} y1={centerY - 16} x2={centerX} y2={centerY + 16} stroke={th.gold} strokeWidth="2.5" strokeLinecap="round" opacity="0.6" />
          <line x1={centerX - 10} y1={centerY - 6} x2={centerX + 10} y2={centerY - 6} stroke={th.gold} strokeWidth="2.5" strokeLinecap="round" opacity="0.6" />
          {/* Connection lines to each person */}
          {people.map((p, i) => {
            const angle = (i / people.length) * Math.PI * 2 - Math.PI / 2;
            const px = centerX + Math.cos(angle) * radius;
            const py = centerY + Math.sin(angle) * radius;
            return (
              <line key={`line-${p.id}`} x1={centerX} y1={centerY} x2={px} y2={py}
                stroke={p.prayed ? th.gold : th.dim} strokeWidth={p.prayed ? 1.5 : 0.8}
                opacity={p.prayed ? 0.6 : 0.2} strokeDasharray={p.prayed ? "none" : "3,3"}>
                {p.prayed && <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite" />}
              </line>
            );
          })}
          {/* Person nodes */}
          {people.map((p, i) => {
            const angle = (i / people.length) * Math.PI * 2 - Math.PI / 2;
            const px = centerX + Math.cos(angle) * radius;
            const py = centerY + Math.sin(angle) * radius;
            return (
              <g key={p.id}>
                {p.prayed && (
                  <circle cx={px} cy={py} r="18" fill="url(#prayerGlow)">
                    <animate attributeName="r" values="15;20;15" dur="3s" repeatCount="indefinite" />
                  </circle>
                )}
                <circle cx={px} cy={py} r="10" fill={p.prayed ? th.gold : isDark ? "#374151" : "#D1D5DB"}
                  opacity={p.prayed ? 0.9 : 0.5} />
                {/* Simple human icon inside */}
                <circle cx={px} cy={py - 3} r="2.5" fill={p.prayed ? (isDark ? "#050508" : "#fff") : th.dim} />
                <line x1={px} y1={py} x2={px} y2={py + 4} stroke={p.prayed ? (isDark ? "#050508" : "#fff") : th.dim}
                  strokeWidth="1.5" strokeLinecap="round" />
                <text x={px} y={py + 24} textAnchor="middle" fill={p.prayed ? th.gold : th.dim}
                  fontSize="7" fontWeight="600" fontFamily="JetBrains Mono, monospace">{p.name}</text>
              </g>
            );
          })}
        </svg>
      </div>

      {/* Prayer list */}
      <div style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.12em", marginBottom: 10 }}>PRAYER LIST</div>
      {people.map(p => (
        <div key={p.id} style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "12px 14px", borderRadius: 12, marginBottom: 6,
          background: p.prayed ? `${th.gold}08` : th.glass,
          border: `1px solid ${p.prayed ? th.gold + "25" : th.glassBorder}`,
          cursor: "pointer", transition: "all 0.25s ease",
        }}>
          <div onClick={() => { togglePrayed(p.id); if (!p.prayed) playTick(); }}
            style={{ display: "flex", alignItems: "center", gap: 12, flex: 1 }}>
            <div style={{
              width: 22, height: 22, borderRadius: 7, flexShrink: 0,
              border: `1.5px solid ${p.prayed ? th.gold : th.dim}`,
              background: p.prayed ? th.gold : "transparent",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all 0.25s ease", boxShadow: p.prayed ? `0 0 10px ${th.gold}30` : "none",
            }}>
              {p.prayed && <span style={{ color: th.check, fontSize: 12, fontWeight: 800 }}>{"\u2713"}</span>}
            </div>
            <span style={{ fontSize: 13, fontWeight: 500, color: p.prayed ? th.dim : th.text,
              textDecoration: p.prayed ? "line-through" : "none" }}>{p.name}</span>
          </div>
          <button onClick={() => { if (confirm(`Remove "${p.name}" from prayer list?`)) removePerson(p.id); }} style={{
            background: "none", border: "none", color: th.dim, cursor: "pointer",
            fontSize: 14, padding: "2px 6px", fontFamily: FONT,
          }}>{"\u2715"}</button>
        </div>
      ))}

      {/* Add person */}
      {adding ? (
        <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
          <input value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && newName.trim()) { addPerson(newName.trim()); setNewName(""); setAdding(false); }
              if (e.key === "Escape") setAdding(false); }}
            autoFocus placeholder="Name or group..."
            style={{ flex: 1, padding: "8px 12px", borderRadius: 8, border: `1px solid ${th.gold}30`,
              background: th.glass, color: th.text, fontSize: 12, fontFamily: FONT, outline: "none" }} />
          <button onClick={() => { if (newName.trim()) { addPerson(newName.trim()); setNewName(""); setAdding(false); }}} style={{
            padding: "8px 14px", borderRadius: 8, border: `1px solid ${th.gold}40`,
            background: th.goldDim, color: th.gold, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
          }}>ADD</button>
        </div>
      ) : (
        <button onClick={() => setAdding(true)} style={{
          width: "100%", padding: "10px", borderRadius: 10, marginTop: 8,
          border: `1px dashed ${th.gold}30`, background: "transparent",
          color: th.gold, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: FONT,
        }}>+ ADD TO PRAYER LIST</button>
      )}
    </div>
  );
}

// ─── USER PROFILE ───
const PROFILE_KEY = "pva_profile";
function loadProfile() {
  try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || "null"); } catch { return null; }
}
function saveProfile(p) {
  try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch {}
}

// ─── NOTES SYSTEM ───
const NOTES_KEY = "pva_notes";
function loadNotes() {
  try {
    const raw = JSON.parse(localStorage.getItem(NOTES_KEY) || "null");
    if (raw && raw.folders) return raw;
  } catch {}
  return { folders: [{ id: "general", name: "General", icon: "\uD83D\uDCC1" }], notes: [] };
}
function saveNotes(n) {
  try { localStorage.setItem(NOTES_KEY, JSON.stringify(n)); } catch {}
}

function NotesView({ th, onBack }) {
  const [data, setData] = useState(loadNotes);
  const [activeFolder, setActiveFolder] = useState(null);
  const [activeNote, setActiveNote] = useState(null);
  const [showNewFolder, setShowNewFolder] = useState(false);
  const [newFolderName, setNewFolderName] = useState("");
  const [searchQuery, setSearchQuery] = useState("");

  const persist = (next) => { setData(next); saveNotes(next); };

  const addFolder = () => {
    if (!newFolderName.trim()) return;
    const id = newFolderName.trim().toLowerCase().replace(/[^a-z0-9]+/g, "_") + "_" + Date.now();
    const next = { ...data, folders: [...data.folders, { id, name: newFolderName.trim(), icon: "\uD83D\uDCC2" }] };
    persist(next); setNewFolderName(""); setShowNewFolder(false);
  };

  const deleteFolder = (fid) => {
    if (fid === "general") return;
    const next = { ...data, folders: data.folders.filter(f => f.id !== fid), notes: data.notes.filter(n => n.folderId !== fid) };
    persist(next); setActiveFolder(null);
  };

  const addNote = (folderId) => {
    const note = { id: "note_" + Date.now(), folderId, title: "", body: "", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    const next = { ...data, notes: [note, ...data.notes] };
    persist(next); setActiveNote(note.id);
  };

  const updateNote = (noteId, updates) => {
    const next = { ...data, notes: data.notes.map(n => n.id === noteId ? { ...n, ...updates, updatedAt: new Date().toISOString() } : n) };
    persist(next);
  };

  const deleteNote = (noteId) => {
    const next = { ...data, notes: data.notes.filter(n => n.id !== noteId) };
    persist(next); setActiveNote(null);
  };

  const backBtn = (onClick) => (
    <button onClick={onClick} style={{
      width: 40, height: 40, borderRadius: 12, cursor: "pointer",
      border: `1px solid ${th.glassBorder}`, background: th.glass,
      color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: FONT, backdropFilter: "blur(20px)",
    }}>{"\u2190"}</button>
  );

  const glassCard = { borderRadius: 14, border: `1px solid ${th.glassBorder}`, background: th.glass, backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)" };

  // ─── NOTE EDITOR ───
  if (activeNote) {
    const note = data.notes.find(n => n.id === activeNote);
    if (!note) { setActiveNote(null); return null; }
    const folder = data.folders.find(f => f.id === note.folderId);
    return (
      <div style={{ padding: "20px", fontFamily: FONT }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
          {backBtn(() => setActiveNote(null))}
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, color: th.dim }}>{folder ? folder.name : "Notes"}</div>
          </div>
          <button onClick={() => { if (confirm("Delete this note?")) deleteNote(note.id); }} style={{
            padding: "8px 14px", borderRadius: 10, border: `1px solid rgba(220,38,38,0.3)`,
            background: "rgba(220,38,38,0.08)", color: "#DC2626", fontSize: 11, fontWeight: 600,
            cursor: "pointer", fontFamily: FONT,
          }}>DELETE</button>
        </div>
        <input value={note.title} onChange={e => updateNote(note.id, { title: e.target.value })}
          placeholder="Note title..." style={{
            width: "100%", padding: "14px 0", marginBottom: 8, border: "none", borderBottom: `1px solid ${th.glassBorder}`,
            background: "transparent", color: th.text, fontSize: 20, fontWeight: 700,
            fontFamily: FONT, outline: "none",
          }} />
        <textarea value={note.body} onChange={e => updateNote(note.id, { body: e.target.value })}
          placeholder="Start writing..." style={{
            width: "100%", minHeight: "50vh", padding: "14px 0", border: "none",
            background: "transparent", color: th.text, fontSize: 14, fontWeight: 400,
            fontFamily: FONT, outline: "none", resize: "none", lineHeight: 1.8,
          }} />
        <div style={{ fontSize: 10, color: th.ghost, marginTop: 12 }}>
          Last edited {new Date(note.updatedAt).toLocaleString()}
        </div>
      </div>
    );
  }

  // ─── FOLDER VIEW (notes list) ───
  if (activeFolder) {
    const folder = data.folders.find(f => f.id === activeFolder);
    const folderNotes = data.notes.filter(n => n.folderId === activeFolder).sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));
    return (
      <div style={{ padding: "20px", fontFamily: FONT }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
          {backBtn(() => setActiveFolder(null))}
          <div style={{ fontSize: 18, fontWeight: 800, color: th.text }}>{folder ? folder.name : "Notes"}</div>
          <div style={{ flex: 1 }} />
          <button onClick={() => addNote(activeFolder)} style={{
            padding: "8px 14px", borderRadius: 10, border: `1px solid ${th.blue}40`,
            background: th.blueDim, color: th.blue, fontSize: 11, fontWeight: 700,
            cursor: "pointer", fontFamily: FONT,
          }}>+ NEW</button>
          {activeFolder !== "general" && (
            <button onClick={() => { if (confirm("Delete this folder and all its notes?")) deleteFolder(activeFolder); }} style={{
              padding: "8px 14px", borderRadius: 10, border: `1px solid rgba(220,38,38,0.3)`,
              background: "rgba(220,38,38,0.08)", color: "#DC2626", fontSize: 11, fontWeight: 600,
              cursor: "pointer", fontFamily: FONT,
            }}>DELETE FOLDER</button>
          )}
        </div>
        {folderNotes.length === 0 && (
          <div style={{ textAlign: "center", padding: "50px 20px", color: th.dim }}>

// ─── ROUTINE PARSER ───
function parseRoutineText(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 0);
  const items = [];
  for (const line of lines) {
    const m = line.match(/^[\*\-\u2022]?\s*(\d{1,2}[:\.]?\d{0,2})\s*[\u2013\-to]+\s*(\d{1,2}[:\.]?\d{0,2})\s*[\u2013\-:]*\s*(.+)$/i)
           || line.match(/^[\*\-\u2022]?\s*(\d{1,2}[:\.]?\d{0,2})\s*[\u2013\-:]+\s*(.+)$/i);
    if (m) {
      const startRaw = m[1].replace(".", ":"); const endRaw = m[2] ? (m[3] ? m[2].replace(".", ":") : null) : null;
      const label = m[3] || m[2]; const startT = startRaw.includes(":") ? startRaw : startRaw + ":00";
      const endT = endRaw ? (endRaw.includes(":") ? endRaw : endRaw + ":00") : null;
      const time = endT ? startT + "\u2013" + endT : startT;
      const id = label.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "").slice(0, 40);
      items.push({ id: id + "_" + items.length, label: label.trim(), time, xp: 15, type: "check" });
    } else if (line.length > 2) {
      const id = line.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "").slice(0, 40);
      items.push({ id: id + "_" + items.length, label: line, time: "Flexible", xp: 15, type: "check" });
    }
  }
  return items;
}

function buildTasksFromRoutine(items) {
  const cats = { person: [], people: [], process: [], product: [] };
  const personKw = ["pray", "prayer", "secret place", "exercise", "workout", "meal", "eat", "meditat", "worship", "fast", "walk", "altar", "intercession", "courts", "declarations", "get ready", "wake", "sleep", "bible", "devotion"];
  const peopleKw = ["family", "call", "mentor", "community", "friend", "fellowship"];
  const processKw = ["brief", "meeting", "work", "phd", "study", "read", "admin", "email", "office", "report", "prep"];
  const productKw = ["course", "create", "build", "write", "design", "content", "music", "project", "improv", "develop"];
  for (const item of items) {
    const low = item.label.toLowerCase();
    if (peopleKw.some(k => low.includes(k))) cats.people.push(item);
    else if (productKw.some(k => low.includes(k))) cats.product.push(item);
    else if (processKw.some(k => low.includes(k))) cats.process.push(item);
    else cats.person.push(item);
  }
  return {
    person: { label: "Person", subtitle: "Spirit \u2192 Soul \u2192 Body", sections: cats.person.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) },
    people: { label: "People", subtitle: "Family & Community", sections: cats.people.length > 0 ? cats.people.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) : [{ name: "CONNECTIONS", time: "Flexible", tasks: [{ id: "people_connect", label: "Connect with someone", xp: 10, type: "check" }] }] },
    process: { label: "Process", subtitle: "Systems & Workflows", sections: cats.process.length > 0 ? cats.process.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) : [{ name: "SYSTEMS", time: "Flexible", tasks: [{ id: "process_task", label: "Work on systems", xp: 15, type: "check" }] }] },
    product: { label: "Product", subtitle: "Output & Creation", sections: cats.product.length > 0 ? cats.product.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) : [{ name: "CREATE", time: "Flexible", tasks: [{ id: "product_task", label: "Create something", xp: 15, type: "check" }] }] },
  };
}

              )}
            </div>
          </div>
        )}
      </div>
    )},
    { pillar: "PEOPLE", title: "Do you mentor or disciple anyone?", sub: "Investing in someone else\u2019s growth", render: () => (
      <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
        {smallBtn(answers.mentoring, () => set("mentoring", true), "YES")}
        {smallBtn(!answers.mentoring, () => set("mentoring", false), "NO")}
      </div>
    )},
    { pillar: "PEOPLE", title: "Any other people commitments?", sub: "Separate with commas (e.g. Prayer Altar, Accountability Call)", render: () => (
      <input value={answers.peopleTasks} onChange={e => set("peopleTasks", e.target.value)} placeholder="Prayer Altar, Accountability Call..." style={{ ...inputStyle, textAlign: "left" }} />
    )},

    // ─── PROCESS: Systems & Workflows ───
    { pillar: "PROCESS", title: "What are your work hours?", sub: "Your main professional block", render: () => (
      <div style={{ display: "flex", gap: 12, alignItems: "center", justifyContent: "center" }}>
        <input type="time" value={answers.workStart} onChange={e => set("workStart", e.target.value)} style={{ ...inputStyle, width: "45%" }} />
        <span style={{ color: th.dim }}>to</span>
        <input type="time" value={answers.workEnd} onChange={e => set("workEnd", e.target.value)} style={{ ...inputStyle, width: "45%" }} />
      </div>
    )},
    { pillar: "PROCESS", title: "What are your main professional tasks?", sub: "Separate with commas (e.g. Briefs, Reports, Meetings)", render: () => (
      <input value={answers.workTasks} onChange={e => set("workTasks", e.target.value)} placeholder="Briefs, Reports, Meetings..." style={{ ...inputStyle, textAlign: "left" }} />
    )},
    { pillar: "PROCESS", title: "Are you studying or doing academic work?", sub: "PhD, coursework, research, exams", render: () => (
      <div>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 16 }}>
          {smallBtn(answers.studying, () => set("studying", true), "YES")}
          {smallBtn(!answers.studying, () => set("studying", false), "NO")}
        </div>
        {answers.studying && (
          <div>
            {sectionLabel("WHAT ARE YOU STUDYING?")}
            <input value={answers.studyTopic} onChange={e => set("studyTopic", e.target.value)} placeholder="PhD Prep, Thesis Writing, Exam Revision..." style={{ ...inputStyle, textAlign: "left" }} />
          </div>
        )}
      </div>
    )},
    { pillar: "PROCESS", title: "Any side projects or organisations you work on?", sub: "Separate with commas (e.g. IDEG, Church Admin, Non-profit)", render: () => (
      <input value={answers.sideTasks} onChange={e => set("sideTasks", e.target.value)} placeholder="IDEG, Church Admin, Non-profit..." style={{ ...inputStyle, textAlign: "left" }} />
    )},

    // ─── PRODUCT: Output & Creation ───
    { pillar: "PRODUCT", title: "What do you create or produce?", sub: "Courses, content, apps, writing, music, designs", render: () => (
      <input value={answers.productTasks} onChange={e => set("productTasks", e.target.value)} placeholder="Courses, Blog Posts, App Development..." style={{ ...inputStyle, textAlign: "left" }} />
    )},
  ];

  const q = questions[qStep];
  const isLast = qStep === questions.length - 1;
  const pillarColors = { PERSON: th.red || "#EF4444", PEOPLE: "#A855F7", PROCESS: th.green || "#16A34A", PRODUCT: th.blue || "#3B82F6" };

  return (
    <div style={{ textAlign: "center" }}>
      <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 12, marginBottom: 20 }}>
        <div style={{ fontSize: 9, fontWeight: 800, color: pillarColors[q.pillar] || th.dim, letterSpacing: "0.16em", padding: "4px 12px", borderRadius: 8, background: (pillarColors[q.pillar] || th.dim) + "15", border: `1px solid ${(pillarColors[q.pillar] || th.dim)}30` }}>{q.pillar}</div>
        <div style={{ fontSize: 10, color: th.dim, letterSpacing: "0.14em" }}>STEP {qStep + 1} OF {questions.length}</div>
      </div>
      <h2 style={{ fontSize: 20, fontWeight: 800, color: th.text, letterSpacing: "-0.03em", marginBottom: 8 }}>{q.title}</h2>
      <p style={{ fontSize: 12, color: th.dim, marginBottom: 28 }}>{q.sub}</p>
      {q.render()}
      <div style={{ display: "flex", gap: 12, marginTop: 20 }}>
        {qStep > 0 && <button onClick={() => setQStep(qStep - 1)} style={{ ...btnStyle(true), flex: 1 }}>BACK</button>}
        <button onClick={() => { if (isLast) { onFinish(buildFromAnswers()); } else { setQStep(qStep + 1); } }} style={{ ...btnStyle(true), flex: 1 }}>{isLast ? "BUILD MY ROUTINE" : "NEXT"}</button>
      </div>
      {/* Progress dots */}
      <div style={{ display: "flex", justifyContent: "center", gap: 4, marginTop: 16 }}>
        {questions.map((qq, i) => (
          <div key={i} style={{ width: i === qStep ? 16 : 6, height: 6, borderRadius: 3, background: i <= qStep ? (pillarColors[qq.pillar] || th.blue) : th.ghost, transition: "all 0.3s ease" }} />
        ))}
      </div>
    </div>
  );
}

// ─── FREE TEXT ROUTINE BUILDER ───
function FreeTextRoutineBuilder({ onFinish, th }) {
  const [text, setText] = useState("");
  const inputStyle = { width: "100%", padding: "14px 18px", borderRadius: 12, marginBottom: 12, border: `1px solid ${th.blue}30`, background: th.glass, color: th.text, fontSize: 12, fontWeight: 500, fontFamily: FONT, outline: "none", textAlign: "left", backdropFilter: "blur(20px)", minHeight: 200, resize: "vertical", lineHeight: 1.8 };
  const placeholder = "Paste your routine here, e.g.:\n\n05:00-06:00 - Secret Place\n06:00-07:00 - Exercise\n09:00-11:00 - Work briefs\n12:00-12:15 - Prayer\n13:00-14:00 - Create content";
  const parsed = parseRoutineText(text);
  return (
    <div style={{ textAlign: "center" }}>
      <h2 style={{ fontSize: 20, fontWeight: 800, color: th.text, letterSpacing: "-0.03em", marginBottom: 8 }}>Paste Your Routine</h2>
      <p style={{ fontSize: 12, color: th.dim, marginBottom: 20 }}>One task per line with times (e.g. 09:00-11:00 - Task Name)</p>
      <textarea value={text} onChange={e => setText(e.target.value)} placeholder={placeholder} style={inputStyle} />

        <div style={{ fontSize: 11, color: th.mid, marginBottom: 12 }}>{parsed.length} task{parsed.length !== 1 ? "s" : ""} detected</div>

        width: "100%", padding: "14px", borderRadius: 12,
        border: `1px solid ${parsed.length > 0 ? th.blue + "40" : th.ghost}`,
        background: parsed.length > 0 ? th.blueDim : th.glass,
        color: parsed.length > 0 ? th.blue : th.ghost,

}

// ─── OPENING SPLASH (after onboarding) ───
function OpeningSplash({ name, onFinish, th }) {
  const [phase, setPhase] = useState(0); // 0=fade-in words, 1=hold, 2=fade-out
  useEffect(() => {
    const t1 = setTimeout(() => setPhase(1), 600);
    const t2 = setTimeout(() => setPhase(2), 3800);
    const t3 = setTimeout(() => onFinish(), 4800);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, []);
  const words1 = "Time is a currency,".split(" ");
  const words2 = "let's spend it wisely.".split(" ");
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 9999, background: th === dark ? "#060810" : "#F4F3F0",
      display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column",
      fontFamily: FONT, transition: "opacity 0.9s ease", opacity: phase === 2 ? 0 : 1,
    }}>
      <style>{`
        @keyframes splashWordIn { from { opacity:0; transform:translateY(18px) scale(0.97); filter:blur(6px); } to { opacity:1; transform:translateY(0) scale(1); filter:blur(0); } }
        @keyframes splashLineGrow { from { width:0; } to { width:60px; } }
        @keyframes splashNameIn { from { opacity:0; letter-spacing:0.5em; } to { opacity:0.4; letter-spacing:0.3em; } }
      `}</style>
      <div style={{ textAlign: "center", maxWidth: 500, padding: "0 32px" }}>
        <div style={{ marginBottom: 28 }}>
          {words1.map((w, i) => (
            <span key={i} style={{
              display: "inline-block", fontSize: 32, fontWeight: 300, color: th === dark ? "rgba(255,255,255,0.88)" : "rgba(0,0,0,0.82)",
              letterSpacing: "-0.02em", lineHeight: 1.4, marginRight: 10,
              animation: `splashWordIn 0.7s cubic-bezier(0.16,1,0.3,1) ${i * 0.12}s both`,
            }}>{w}</span>
          ))}
        </div>
        <div style={{ marginBottom: 36 }}>
          {words2.map((w, i) => (
            <span key={i} style={{
              display: "inline-block", fontSize: 32, fontWeight: 600, color: th === dark ? "#94B8DB" : "#3B6B8A",
              letterSpacing: "-0.02em", lineHeight: 1.4, marginRight: 10,
              animation: `splashWordIn 0.7s cubic-bezier(0.16,1,0.3,1) ${(words1.length + i) * 0.12 + 0.15}s both`,
            }}>{w}</span>
          ))}
        </div>
        <div style={{
          width: 60, height: 1, margin: "0 auto 28px",
          background: th === dark ? "rgba(148,184,219,0.4)" : "rgba(59,107,138,0.3)",
          animation: "splashLineGrow 0.8s cubic-bezier(0.16,1,0.3,1) 1.2s both",
        }} />
        <div style={{
          fontSize: 10, fontWeight: 700, textTransform: "uppercase",
          color: th === dark ? "rgba(255,255,255,0.4)" : "rgba(0,0,0,0.35)",
          letterSpacing: "0.3em",
          animation: "splashNameIn 1s cubic-bezier(0.16,1,0.3,1) 1.5s both",
        }}>Welcome, {name}</div>
      </div>
    </div>
  );
}

  const [showSplash, setShowSplash] = useState(false);
  const [pendingProfile, setPendingProfile] = useState(null);
  const [pendingTasks, setPendingTasks] = useState(null);
  const [authEmail, setAuthEmail] = useState("");
  const [authPassword, setAuthPassword] = useState("");
  const [authError, setAuthError] = useState("");
  const [authMode, setAuthMode] = useState("signin"); // "signin" or "signup"
  const [authLoading, setAuthLoading] = useState(false);
  const [showEmailForm, setShowEmailForm] = useState(false);
  const th = getAutoTheme() === "dark" ? dark : light;

  const doCompleteName = () => {
    if (name.trim()) setStep(2);
  };

  const doFinish = (customTasks) => {
    if (name.trim()) {
      const profile = { name: name.trim(), createdAt: TODAY };
      setPendingProfile(profile);
      setPendingTasks(customTasks);
      setShowSplash(true);
    }
  };

  const doSkip = () => {
    if (name.trim()) {
      const profile = { name: name.trim(), createdAt: TODAY };
      // Save a "skipped" routine marker so the home page doesn't ask again
      saveRoutineData({ skipped: true, createdAt: new Date().toISOString() });
      setPendingProfile(profile);
      setShowSplash(true);
    }
  };

  const handleSplashDone = () => {
    if (pendingProfile) {
      saveProfile(pendingProfile);
      if (pendingTasks) onCustomTasks(pendingTasks);

            </p>
            <div style={{
              padding: "24px 28px", borderRadius: 16, marginBottom: 24,
              background: "rgba(255,255,255,0.12)", border: `1px solid rgba(255,255,255,0.25)`,
              backdropFilter: "blur(28px)", WebkitBackdropFilter: "blur(28px)",
              boxShadow: "0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.3)",

              </p>
              <div style={{ fontSize: 12, color: th.text, marginBottom: 8 }}>
                <span style={{ color: th.text, fontWeight: 700 }}>PERSON</span> {"\u2014"} this is you.
              </div>
              <div style={{ fontSize: 12, color: th.text, marginBottom: 8 }}>
                <span style={{ color: th.text, fontWeight: 700 }}>PEOPLE</span> {"\u2014"} this is your family and community.
              </div>
              <div style={{ fontSize: 12, color: th.text, marginBottom: 8 }}>
                <span style={{ color: th.text, fontWeight: 700 }}>PROCESS</span> {"\u2014"} this is the system and workflow.

                            width: "100%", padding: "13px", borderRadius: 10,
                            border: "none",
                            background: (authEmail && authPassword && !authLoading) ? "linear-gradient(135deg, " + (th.blue || "#3B82F6") + ", #6366F1)" : th.ghost,
                            color: (authEmail && authPassword && !authLoading) ? "#fff" : th.dim,

];
const getDailyPrompt = (date) => {
  const seed = date.split("-").join("").split("").reduce((a, c, i) => a + c.charCodeAt(0) * (i + 3), 0);
  return DEVOTIONAL_PROMPTS[seed % DEVOTIONAL_PROMPTS.length];
};

  return Math.round(Math.min(100, Math.max(0, dayPct)));

function getDailyMessage(score) {
  return "";

function getDailyColor(score, th) {

// ─── PILLAR BALANCE RADAR ───
function PillarRadar({ state, tasks, th }) {
  const catKeys = ["person", "people", "process", "product"];
  const catLabels = ["Person", "People", "Process", "Product"];
  const catColors = ["#DC2626", "#7C3AED", "#16A34A", th.blue];
  const values = catKeys.map(k => {
    const a = (tasks[k]?.sections || []).flatMap(s => s.tasks);
    const d = a.filter(t => t.type === "check" ? state.completed?.[t.id] : (state.counters?.[t.id] || 0) >= (t.target || 1)).length;
    return a.length > 0 ? d / a.length : 0;
  });
  const cx = 100, cy = 100, r = 70;
  const angles = values.map((_, i) => (Math.PI * 2 * i / 4) - Math.PI / 2);
  const gridLevels = [0.25, 0.5, 0.75, 1.0];
  const pointsStr = (scale) => values.map((v, i) => {
    const val = v * scale * r;
    return `${cx + val * Math.cos(angles[i])},${cy + val * Math.sin(angles[i])}`;
  }).join(" ");
  return (
    <div style={{ ...glassStyle(th), padding: "20px", marginBottom: 16 }}>
      <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 14 }}>PILLAR BALANCE</div>
      <svg viewBox="0 0 200 200" width="100%" style={{ maxWidth: 260, display: "block", margin: "0 auto" }}>
        {gridLevels.map(lvl => (
          <polygon key={lvl} points={angles.map(a => `${cx + r * lvl * Math.cos(a)},${cy + r * lvl * Math.sin(a)}`).join(" ")}
            fill="none" stroke={th.ghost} strokeWidth="0.5" />
        ))}
        {angles.map((a, i) => (
          <g key={i}>
            <line x1={cx} y1={cy} x2={cx + r * Math.cos(a)} y2={cy + r * Math.sin(a)} stroke={th.ghost} strokeWidth="0.5" />
            <text x={cx + (r + 14) * Math.cos(a)} y={cy + (r + 14) * Math.sin(a)} textAnchor="middle" dominantBaseline="middle"
              fill={catColors[i]} fontSize="8" fontWeight="700" fontFamily="JetBrains Mono, monospace">{catLabels[i]}</text>
          </g>
        ))}
        <polygon points={pointsStr(1)} fill={th.blue + "20"} stroke={th.blue} strokeWidth="1.5" />
        {values.map((v, i) => (
          <circle key={i} cx={cx + v * r * Math.cos(angles[i])} cy={cy + v * r * Math.sin(angles[i])} r="4"
            fill={catColors[i]} stroke="#fff" strokeWidth="1" />
        ))}
      </svg>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginTop: 12 }}>
        {catKeys.map((k, i) => (
          <div key={k} style={{ fontSize: 10, color: th.mid, display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 8, height: 8, borderRadius: 4, background: catColors[i] }} />
            <span style={{ fontWeight: 600 }}>{Math.round(values[i] * 100)}%</span> {catLabels[i]}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── TRENDS & ANALYTICS VIEW ───
function TrendsView({ state, tasks, th, onBack }) {
  const [range, setRange] = useState(7);
  const hist = (state.history || []).slice(-range);
  const maxXp = Math.max(...hist.map(d => d?.xp || 0), 1);
  const avgPct = hist.length > 0 ? Math.round(hist.reduce((s, d) => s + (d?.pct || 0), 0) / hist.length) : 0;
  const bestDay = hist.reduce((best, d) => (d?.pct || 0) > (best?.pct || 0) ? d : best, hist[0]);
  const catKeys = ["person", "people", "process", "product"];
  const catLabels = { person: "Person", people: "People", process: "Process", product: "Product" };
  const catColors = { person: "#DC2626", people: "#7C3AED", process: "#16A34A", product: th.blue };
  const catAvgs = {};
  catKeys.forEach(k => {
    const vals = hist.map(d => d?.cats?.[k] || 0);
    catAvgs[k] = vals.length > 0 ? Math.round(vals.reduce((s, v) => s + v, 0) / vals.length) : 0;
  });
  const weakest = catKeys.reduce((w, k) => catAvgs[k] < catAvgs[w] ? k : w, catKeys[0]);
  const strongest = catKeys.reduce((s, k) => catAvgs[k] > catAvgs[s] ? k : s, catKeys[0]);

  // Weekly insight message
  const insightMsg = weakest !== strongest
    ? `Strong in ${catLabels[strongest]} (${catAvgs[strongest]}%) but ${catLabels[weakest]} needs attention (${catAvgs[weakest]}%). Consider dedicating more focus there.`
    : `All pillars are balanced at ${catAvgs[strongest]}%. Keep up the consistency!`;

  const rangeBtn = (v, label) => (
    <button key={v} onClick={() => setRange(v)} style={{

  return (

        <button onClick={onBack} style={{ width: 40, height: 40, borderRadius: 12, cursor: "pointer", border: `1px solid ${th.glassBorder}`, background: th.glass, color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT, backdropFilter: "blur(20px)" }}>{"\u2190"}</button>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>Trends & Insights</div>
          <div style={{ fontSize: 10, color: th.dim }}>Your progress over time</div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {rangeBtn(7, "7D")}{rangeBtn(14, "14D")}{rangeBtn(30, "30D")}
      </div>

      {/* Completion Graph */}
      <div style={{ ...glassStyle(th), padding: "16px", marginBottom: 12 }}>
        <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 12 }}>DAILY COMPLETION</div>
        <svg viewBox={`0 0 ${Math.max(hist.length * 30, 200)} 80`} width="100%" style={{ display: "block" }}>
          {hist.map((d, i) => {
            const pct = d?.pct || 0;
            const h = (pct / 100) * 60;

            return (

function loadPrayers() {
  try { return JSON.parse(localStorage.getItem(PRAYER_KEY) || "[]"); } catch { return []; }
}
function savePrayers(p) {
  try { localStorage.setItem(PRAYER_KEY, JSON.stringify(p)); } catch {}

function PrayerJournalView({ th, onBack }) {
  const [prayers, setPrayers] = useState(loadPrayers);
  const [newText, setNewText] = useState("");
  const [filter, setFilter] = useState("all");

    if (!newText.trim()) return;
    const p = { id: Date.now(), text: newText.trim(), status: "ongoing", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    const next = [p, ...prayers];
    setPrayers(next); savePrayers(next); setNewText("");

  const updateStatus = (id, status) => {
    const next = prayers.map(p => p.id === id ? { ...p, status, updatedAt: new Date().toISOString() } : p);
    setPrayers(next); savePrayers(next);
  };

    const next = prayers.filter(p => p.id !== id);

      const nextDate = new Date(); nextDate.setDate(nextDate.getDate() + intervals[newLevel]);
      return { ...v, level: newLevel, lastReviewed: new Date().toISOString(), nextReview: nextDate.toISOString(), reviews: v.reviews + 1 };
    });
    setVerses(next); saveMemVerses(next); setPracticing(null); setShowText(false);
  };
  const removeVerse = (id) => {
    const next = verses.filter(v => v.id !== id);
    setVerses(next); saveMemVerses(next);
  };

  const dueVerses = verses.filter(v => new Date(v.nextReview) <= new Date());
  const levelColors = ["#EF4444", "#F59E0B", "#3B82F6", "#8B5CF6", "#22C55E", "#10B981"];
  const levelNames = ["New", "Learning", "Familiar", "Known", "Strong", "Mastered"];

  return (
    <div style={{ padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>

// ─── TEMPLE BUILDING VISUAL ───
function TempleBuildingVisual({ state, th }) {
  const hist = state.history || [];
  const last14 = hist.slice(-14);
  const completedDays = last14.filter(d => (d?.pct || 0) >= 50).length;
  const missedDays = last14.filter(d => (d?.pct || 0) < 50).length;
  const totalBricks = 14;
  const rows = 7;
  const bricksPerRow = 2;
  const brickW = 28, brickH = 10, gap = 2;
  const baseY = 100;
  const baseX = 50 - ((bricksPerRow * brickW + (bricksPerRow - 1) * gap) / 2);

  return (
    <div style={{ ...glassStyle(th), padding: "16px", marginBottom: 16 }}>
      <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 10 }}>YOUR TEMPLE</div>
      <svg viewBox="0 0 100 120" width="100%" style={{ maxWidth: 200, display: "block", margin: "0 auto" }}>
        {/* Foundation */}
        <rect x="10" y={baseY + 2} width="80" height="6" rx="2" fill={th.gold} opacity="0.3" />
        {/* Bricks */}
        {Array.from({ length: totalBricks }).map((_, i) => {
          const row = Math.floor(i / bricksPerRow);
          const col = i % bricksPerRow;
          const x = baseX + col * (brickW + gap);
          const y = baseY - (row + 1) * (brickH + gap);
          const isBuilt = i < completedDays;
          const isCracked = !isBuilt && i < completedDays + missedDays;
          return (
            <g key={i}>
              <rect x={x} y={y} width={brickW} height={brickH} rx="2"
                fill={isBuilt ? th.gold : isCracked ? th.red + "30" : th.ghost}
                stroke={isBuilt ? th.gold : isCracked ? th.red + "50" : th.ghost}
                strokeWidth="0.5" opacity={isBuilt ? 0.8 : 0.3} />
              {isCracked && (
                <line x1={x + 5} y1={y + 2} x2={x + brickW - 5} y2={y + brickH - 2}
                  stroke={th.red} strokeWidth="0.8" opacity="0.5" />
              )}
            </g>
          );
        })}
        {/* Roof / pinnacle if mostly complete */}
        {completedDays >= 10 && (
          <polygon points={`${50},${baseY - rows * (brickH + gap) - 15} ${baseX - 2},${baseY - rows * (brickH + gap) + 2} ${baseX + bricksPerRow * brickW + (bricksPerRow - 1) * gap + 2},${baseY - rows * (brickH + gap) + 2}`}
            fill={th.gold} opacity="0.4" />
        )}
        {/* Glow if strong */}
        {completedDays >= 12 && (
          <circle cx="50" cy={baseY - rows * (brickH + gap) - 10} r="8" fill={th.gold} opacity="0.15">
            <animate attributeName="r" values="6;10;6" dur="3s" repeatCount="indefinite" />
          </circle>
        )}
      </svg>
      <div style={{ textAlign: "center", marginTop: 8 }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: th.gold }}>{completedDays}</span>
        <span style={{ fontSize: 10, color: th.dim }}> / {totalBricks} stones laid</span>
        {missedDays > 0 && <span style={{ fontSize: 10, color: th.red, marginLeft: 8 }}>{missedDays} cracked</span>}
      </div>
    </div>
  );
}

const PETS_KEY = "pva_pets";
function loadPets() { try { return JSON.parse(localStorage.getItem(PETS_KEY) || '{"unlocked":[],"active":null,"activeMount":null}'); } catch { return { unlocked: [], active: null, activeMount: null }; } }
function savePets(p) { try { localStorage.setItem(PETS_KEY, JSON.stringify(p)); } catch {} }

function getPillarStreaks(history) {
  const streaks = { person: 0, people: 0, process: 0, product: 0 };
  const hist = [...(history || [])].reverse();
  const catKeys = ["person", "people", "process", "product"];
  catKeys.forEach(k => {
    for (const d of hist) {
      if ((d?.cats?.[k] || 0) >= 50) streaks[k]++;
      else break;
    }
  });
  return streaks;
}

function PetsView({ state, th, onBack }) {
  const [pets, setPets] = useState(loadPets);
  const pillarStreaks = getPillarStreaks(state.history);
  const overallStreak = state.streak || 0;
  const catKeys = ["person", "people", "process", "product"];
  const catLabels = { person: "Person", people: "People", process: "Process", product: "Product" };
  const catColors = { person: "#DC2626", people: "#7C3AED", process: "#16A34A", product: "#3B82F6" };

  const unlock = (petName) => {
    if (pets.unlocked.includes(petName)) return;
    const next = { ...pets, unlocked: [...pets.unlocked, petName] };
    setPets(next); savePets(next);
  };
  const setActive = (petName) => {
    const next = { ...pets, active: pets.active === petName ? null : petName };
    setPets(next); savePets(next);
  };
  const setActiveMount = (mountName) => {
    const next = { ...pets, activeMount: pets.activeMount === mountName ? null : mountName };
    setPets(next); savePets(next);
  };

  // Auto-unlock earned pets
  useEffect(() => {
    let changed = false;
    const next = { ...pets, unlocked: [...pets.unlocked] };
    catKeys.forEach(k => {
      PET_LINES[k].forEach(pet => {
        if (pillarStreaks[k] >= pet.req && !next.unlocked.includes(pet.name)) {
          next.unlocked.push(pet.name); changed = true;
        }
      });
    });
    MOUNT_UNLOCKS.forEach(m => {
      if (overallStreak >= m.req && !next.unlocked.includes(m.name)) {
        next.unlocked.push(m.name); changed = true;
      }
    });
    if (changed) { setPets(next); savePets(next); }
  }, []);

  return (
    <div style={{ padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
        <button onClick={onBack} style={{ width: 40, height: 40, borderRadius: 12, cursor: "pointer", border: `1px solid ${th.glassBorder}`, background: th.glass, color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT, backdropFilter: "blur(20px)" }}>{"\u2190"}</button>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>Pets & Mounts</div>
          <div style={{ fontSize: 10, color: th.dim }}>Companions earned through consistency</div>
        </div>
      </div>

      {/* Active companion display */}
      {pets.active && (() => {
        let found = null;
        catKeys.forEach(k => { PET_LINES[k].forEach(p => { if (p.name === pets.active) found = p; }); });
        return found ? (
          <div style={{ ...glassStyle(th), padding: "20px", marginBottom: 16, textAlign: "center" }}>
            <div style={{ fontSize: 40 }}>{found.icon}</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: th.text, marginTop: 6 }}>{found.name}</div>
            <div style={{ fontSize: 9, color: th.dim, marginTop: 2 }}>Active Companion</div>
          </div>
        ) : null;
      })()}

      {/* Pillar creatures */}
      {catKeys.map(k => (
        <div key={k} style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: catColors[k], letterSpacing: "0.14em", marginBottom: 8 }}>{catLabels[k].toUpperCase()} COMPANIONS <span style={{ color: th.dim }}>({pillarStreaks[k]}d streak)</span></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            {PET_LINES[k].map(pet => {
              const unlocked = pets.unlocked.includes(pet.name);
              const isActive = pets.active === pet.name;
              return (
                <div key={pet.name} onClick={() => unlocked && setActive(pet.name)} style={{
                  ...glassStyle(th), padding: "14px 8px", textAlign: "center", cursor: unlocked ? "pointer" : "default",
                  opacity: unlocked ? 1 : 0.4, border: isActive ? `2px solid ${catColors[k]}` : `1px solid ${th.glassBorder}`,
                }}>
                  <div style={{ fontSize: 24 }}>{unlocked ? pet.icon : "--"}</div>
                  <div style={{ fontSize: 9, fontWeight: 700, color: th.text, marginTop: 4 }}>{pet.name}</div>
                  <div style={{ fontSize: 8, color: th.dim, marginTop: 2 }}>{pet.desc}</div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* Mounts */}
      <div style={{ fontSize: 9, fontWeight: 700, color: th.gold, letterSpacing: "0.14em", marginBottom: 8 }}>LEGENDARY MOUNTS <span style={{ color: th.dim }}>({overallStreak}d streak)</span></div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
        {MOUNT_UNLOCKS.map(m => {
          const unlocked = pets.unlocked.includes(m.name);
          const isActive = pets.activeMount === m.name;
          return (
            <div key={m.name} onClick={() => unlocked && setActiveMount(m.name)} style={{
              ...glassStyle(th), padding: "16px", textAlign: "center", cursor: unlocked ? "pointer" : "default",

              <div style={{ fontSize: 8, color: th.dim, marginTop: 2 }}>{m.desc}</div>
            </div>
          );
        })}

  );

function GuildView({ state, th, dayPct, onBack }) {

    name: "", members: [], boss: GUILD_BOSSES[0], bossHp: GUILD_BOSSES[0].hp,
    bossMaxHp: GUILD_BOSSES[0].hp, bossIdx: 0, log: [], created: false,

  const [guildName, setGuildName] = useState(guild.name || "");

  const save = (g) => { setGuild(g); saveGuild(g); };

  const createGuild = () => {
    if (!guildName.trim()) return;
    const g = { ...guild, name: guildName.trim(), created: true };
    save(g);
  };
  const addMember = () => {
    if (!newMember.trim()) return;
    const member = { id: Date.now(), name: newMember.trim(), hp: 100, contribution: 0 };
    save({ ...guild, members: [...guild.members, member] });
    setNewMember("");
  };
  const removeMember = (id) => save({ ...guild, members: guild.members.filter(m => m.id !== id) });

  const attackBoss = () => {
    const damage = Math.round(dayPct * 2 + (state.streak || 0) * 3);
    const newHp = Math.max(0, guild.bossHp - damage);
    const logEntry = { text: `You dealt ${damage} damage!`, time: new Date().toLocaleTimeString(), type: "attack" };
    let g = { ...guild, bossHp: newHp, log: [logEntry, ...guild.log.slice(0, 19)] };
    if (newHp <= 0) {
      const nextIdx = (guild.bossIdx + 1) % GUILD_BOSSES.length;
      const nextBoss = GUILD_BOSSES[nextIdx];
      g = { ...g, boss: nextBoss, bossHp: nextBoss.hp, bossMaxHp: nextBoss.hp, bossIdx: nextIdx,
        log: [{ text: `${guild.boss.name} defeated! +${guild.boss.reward} XP`, time: new Date().toLocaleTimeString(), type: "victory" }, ...g.log] };
    }
    save(g);
  };

  const simulateMissed = (memberId) => {
    const g = { ...guild,
      members: guild.members.map(m => m.id === memberId ? { ...m, hp: Math.max(0, m.hp - 15) } : m),
      log: [{ text: `${guild.members.find(m => m.id === memberId)?.name} missed tasks! Party takes damage.`, time: new Date().toLocaleTimeString(), type: "damage" }, ...guild.log.slice(0, 19)],
    };
    save(g);
  };

  const bossHpPct = guild.bossMaxHp > 0 ? (guild.bossHp / guild.bossMaxHp) * 100 : 0;
  const inputStyle = { width: "100%", padding: "10px 14px", borderRadius: 10, border: `1px solid ${th.glassBorder}`, background: th.glass, color: th.text, fontSize: 12, fontFamily: FONT, outline: "none", boxSizing: "border-box" };

  return (

function saveRewards(r) { try { localStorage.setItem(REWARDS_KEY, JSON.stringify(r)); } catch {} }

  const currentWeek = `${new Date().getFullYear()}-W${getWeek(TODAY)}`;
  const usedThisWeek = state.graceDayUsedWeek === currentWeek;
  const canActivate = !isActive && !usedThisWeek;

  { id: "grateful", label: "Grateful", emoji: "\uD83D\uDE4F", color: "#F59E0B" },

  { id: "restless", label: "Restless", emoji: "\uD83D\uDE1F", color: "#3B82F6" },
  { id: "burdened", label: "Burdened", emoji: "\uD83D\uDE14", color: "#EF4444" },
];
function SoulCheckInCard({ state, setState, th, time }) {
  const key = time === "morning" ? "morningMood" : "eveningMood";
  const current = state[key];
  const setMood = (moodId) => {
    setState(p => {
      const newCheckIns = [...(p.soulCheckIns || [])];
      // Record for correlation analysis
      const existing = newCheckIns.find(c => c.date === TODAY && c.time === time);
      if (existing) { existing.mood = moodId; existing.pct = p.xp; }
      else newCheckIns.push({ date: TODAY, time, mood: moodId, pct: 0 });
      // Keep last 60 entries
      while (newCheckIns.length > 60) newCheckIns.shift();
      // Also store in today's history
      const hist = [...(p.history || [])];
      if (hist.length > 0) {
        if (!hist[hist.length - 1].moods) hist[hist.length - 1].moods = {};
        hist[hist.length - 1].moods[time] = moodId;
      }
      return { ...p, [key]: moodId, soulCheckIns: newCheckIns, history: hist };
    });
  };

  return (
    <div style={{ ...glassStyle(th), padding: "16px 18px", marginBottom: 14 }}>

}

// ─── SOUL INSIGHT (correlation analysis) ───
function getSoulInsight(soulCheckIns, history) {
  if (!soulCheckIns || soulCheckIns.length < 14) return null; // Need at least 2 weeks of data
  // Correlate morning moods with completion percentage
  const moodDays = {};
  SOUL_MOODS.forEach(m => { moodDays[m.id] = { count: 0, totalPct: 0 }; });
  (history || []).forEach(day => {
    const morningMood = day?.moods?.morning;
    if (morningMood && moodDays[morningMood]) {
      moodDays[morningMood].count++;
      moodDays[morningMood].totalPct += day.pct || 0;
    }
  });
  // Find the mood with highest avg completion
  var bestMood = null, bestAvg = 0;
  Object.keys(moodDays).forEach(id => {
    const d = moodDays[id];
    if (d.count >= 3) {
      const avg = d.totalPct / d.count;
      if (avg > bestAvg) { bestAvg = avg; bestMood = id; }
    }
  });
  if (!bestMood) return null;
  const m = SOUL_MOODS.find(s => s.id === bestMood);
  return { mood: m, avgPct: Math.round(bestAvg), count: moodDays[bestMood].count };
}

function getHabitStackSuggestion(state, tasks) {
  const hist = (state.history || []).slice(-14);
  if (hist.length < 7) return null; // Need at least a week of data
  // Track completion rates per task
  const taskRates = {};
  const allTasks = [];
  ["person", "people", "process", "product"].forEach(k => {
    (tasks[k]?.sections || []).forEach(s => {
      s.tasks.forEach(t => {
        if (t.type === "check") allTasks.push(t);
      });
    });
  });
  allTasks.forEach(t => {
    var completed = 0;
    hist.forEach(day => {
      // We can only estimate from the stored history
      // For now we use overall pct as a proxy
    });
    taskRates[t.id] = { label: t.label, id: t.id };
  });

  // Use current state completion to identify strong vs weak habits
  const completed = state.completed || {};
  const strong = allTasks.filter(t => completed[t.id]);
  const weak = allTasks.filter(t => !completed[t.id]);

  if (strong.length === 0 || weak.length === 0) return null;

  // Pick a strong habit and a weak one for stacking
  const strongHabit = strong[0];
  const weakHabit = weak[Math.floor(Math.random() * Math.min(3, weak.length))]; // Pick from first few uncompleted

  return {
    strong: strongHabit.label,
    weak: weakHabit.label,
    message: `You\u2019ve completed "${strongHabit.label}" \u2014 try doing "${weakHabit.label}" right after to build momentum.`,
  };
}

function HabitStackCard({ state, tasks, th }) {

// ─── CELEBRATION PARTICLES ───
function spawnParticles(e) {
  const colors = ["#3B82F6", "#F59E0B", "#22C55E", "#EF4444", "#7C3AED", "#EC4899"];
  const cx = e ? (e.clientX || window.innerWidth / 2) : window.innerWidth / 2;
  const cy = e ? (e.clientY || window.innerHeight / 2) : window.innerHeight / 2;
  for (let i = 0; i < 12; i++) {
    const p = document.createElement("div");
    p.className = "pva-particle";
    const angle = (Math.PI * 2 * i) / 12;
    const dist = 40 + Math.random() * 60;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30;
    p.style.cssText = `left:${cx}px;top:${cy}px;width:${4+Math.random()*4}px;height:${4+Math.random()*4}px;background:${colors[i%colors.length]};--dx:${dx}px;--dy:${dy}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1100);
  }
}

    hist.forEach(d => {

        const dt = new Date(d.date + "T00:00:00");
        lines.push(`  ${days[dt.getDay()]} ${dt.getDate()} ${months[dt.getMonth()]}: ${d.pct || 0}%`);
      }
    });
    lines.push("", "PERSON \u00B7 VEHICLE \u00B7 ASSIGNMENT");
    return lines.join("\n");
  };

  const shareWhatsApp = () => {
    window.open(`https://wa.me/?text=${encodeURIComponent(generateWeeklyReport())}`, "_blank");
    setShared("whatsapp"); setTimeout(() => setShared(null), 2000);
  };
  const shareEmail = () => {
    window.open(`mailto:?subject=PVA Weekly Report - ${dateRange}&body=${encodeURIComponent(generateWeeklyReport())}`, "_blank");
    setShared("email"); setTimeout(() => setShared(null), 2000);
  };
  const shareCopy = () => {
    navigator.clipboard.writeText(generateWeeklyReport());
    setShared("copy"); setTimeout(() => setShared(null), 2000);
  };

  // Also send to saved accountability partners
  const shareToPartners = () => {
    try {
      const partners = JSON.parse(localStorage.getItem("pva_accountability") || "[]");
      const report = generateWeeklyReport();
      if (partners.length === 0) { shareCopy(); return; }
      const emailPartners = partners.filter(p => p.contact && p.contact.includes("@"));
      if (emailPartners.length > 0) {
        const emails = emailPartners.map(p => p.contact).join(",");
        window.open(`mailto:${emails}?subject=PVA Weekly Report - ${dateRange}&body=${encodeURIComponent(report)}`, "_blank");
      } else {
        window.open(`https://wa.me/?text=${encodeURIComponent(report)}`, "_blank");
      }
      setShared("partners"); setTimeout(() => setShared(null), 2000);
    } catch { shareCopy(); }
  };

  const handleClose = () => { setVisible(false); setTimeout(onClose, 400); };

    <div style={{

      opacity: visible ? 1 : 0, transition: "opacity 0.4s ease",
    }} onClick={handleClose}>
      <div onClick={e => e.stopPropagation()} style={{
        maxWidth: 380, width: "90%", borderRadius: 22, overflow: "hidden",
        background: th === dark ? "linear-gradient(170deg, #111827 0%, #0A0E1A 100%)" : "linear-gradient(170deg, #FFFFFF 0%, #F1F5F9 100%)",
        border: `1px solid ${weekColor}30`,
        boxShadow: `0 24px 80px rgba(0,0,0,0.35), 0 0 40px ${weekColor}10`,
        transform: visible ? "scale(1) translateY(0)" : "scale(0.95) translateY(20px)",
        transition: "transform 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease",
        opacity: visible ? 1 : 0,
      }}>
        {/* Header */}
        <div style={{ padding: "24px 24px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 8, fontWeight: 700, color: th.dim, letterSpacing: "0.24em", marginBottom: 4 }}>WEEKLY REPORT CARD</div>
          <div style={{ fontSize: 11, fontWeight: 600, color: th.mid, marginBottom: 14, fontFamily: FONT }}>{dateRange}</div>
          <div style={{ fontSize: 48, fontWeight: 800, color: weekColor, fontFamily: FONT, letterSpacing: "-0.04em", lineHeight: 1 }}>{weekAvg}<span style={{ fontSize: 18, color: th.dim, fontWeight: 600 }}>%</span></div>
          <div style={{ fontSize: 11, fontWeight: 600, color: th.mid, marginTop: 8 }}>
            {weekAvg >= 85 ? "Outstanding week." : weekAvg >= 70 ? "Strong performance." : weekAvg >= 50 ? "Consistent effort." : "Room to grow."}
          </div>
        </div>

        {/* 7-day breakdown */}
        <div style={{ padding: "16px 24px" }}>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 70, justifyContent: "center" }}>
            {hist.map((d, i) => {
              const pct = d?.pct || 0;
              const h = Math.max(4, (pct / 100) * 56);
              const barColor = pct >= 80 ? "#22C55E" : pct >= 50 ? "#3B82F6" : pct >= 30 ? "#F59E0B" : th.ghost;
              const dayDate = new Date((d?.date || TODAY) + "T00:00:00");
              return (
                <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1 }}>
                  <div style={{ fontSize: 7, fontWeight: 700, color: barColor, marginBottom: 3 }}>{pct}%</div>
                  <div style={{
                    width: "100%", maxWidth: 28, height: h, borderRadius: 5,
                    background: `linear-gradient(180deg, ${barColor}, ${barColor}88)`,
