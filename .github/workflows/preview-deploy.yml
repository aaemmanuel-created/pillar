# Per-app caller for the reusable web preview deploy.
#
# Drop this into each app repo at `.github/workflows/preview-deploy.yml`.
# Replace the placeholders before pushing.
#
# Replaces the per-app full templates (preview-deploy-{renew,pillar,burden}.yml)
# which each duplicated ~200 lines of the same logic. This one is ~25 lines.

name: preview-deploy

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - 'bugfix/**'
      - 'docs/**'
      - 'refactor/**'
      - 'wip/**'

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    uses: aaemmanuel-created/pva-workflow/.github/workflows/_reusable-preview-web.yml@main
    with:
      app_name: pillar                                     # renew | pillar | burden
      build_dir: pva-deploy                              # "." for renew (flat), "burden-app" for burden monorepo, "pva-deploy" for pillar
      dist_dir: dist                                      # vite default; PILLAR static = "." (and set static_only: true)
      static_only: true                                 # uncomment for PILLAR (no-build)
      node_version: '22'
      previews_repo: aaemmanuel-created/pillar-previews
      previews_pages_host: aaemmanuel-created.github.io/pillar-previews
    secrets:
      PREVIEW_DEPLOY_TOKEN: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}
      PREVIEW_STABLE_SLUG: ${{ secrets.PREVIEW_STABLE_SLUG }}
