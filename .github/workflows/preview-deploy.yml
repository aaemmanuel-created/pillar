# .github/workflows/preview-deploy.yml — PILLAR
#
# PILLAR's web app is static (single-file React in pva-deploy/, no build step).
# We rewrite paths for the preview folder, then publish pva-deploy/ to a
# SEPARATE previews repo (pillar-previews) so the production deploy at
# pillarbypva.app stays untouched.
#
# Prerequisites in the PILLAR repo:
#   1. A previews repo at <owner>/pillar-previews exists with GH Pages enabled
#      (Source: gh-pages branch, root).
#   2. Secret:
#        PREVIEW_DEPLOY_TOKEN — fine-scoped PAT with `contents:write` on
#                               the previews repo only.
#
# Drop at .github/workflows/preview-deploy.yml in the PILLAR repo.

name: preview-deploy

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - 'bugfix/**'
      - 'docs/**'
      - 'refactor/**'
      - 'wip/**'

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PREVIEWS_REPO_OWNER: aaemmanuel-created
  PREVIEWS_REPO_NAME: pillar-previews
  PREVIEWS_PAGES_HOST: aaemmanuel-created.github.io/pillar-previews

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute branch slug
        id: slug
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SLUG="$(echo "$BRANCH" | tr '/_' '--' | tr -cd 'a-zA-Z0-9-' | tr 'A-Z' 'a-z')"
          echo "value=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Rewrite paths and namespace service-worker cache
        env:
          SLUG: ${{ steps.slug.outputs.value }}
        run: |
          # Namespace the service-worker cache so this preview doesn't collide
          # with the production install installed on your phone at pillarbypva.app.
          sed -i "s/pva-cache-v/preview-${SLUG}-pva-cache-v/g" pva-deploy/sw.js
          # Drop the CNAME from the previews build so it doesn't try to claim
          # the apex domain.
          rm -f pva-deploy/CNAME

      - name: Stage preview folder
        run: |
          mkdir -p _preview
          cp -r pva-deploy/* _preview/

      - name: Deploy to previews repo
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}
          external_repository: ${{ env.PREVIEWS_REPO_OWNER }}/${{ env.PREVIEWS_REPO_NAME }}
          publish_branch: gh-pages
          publish_dir: ./_preview
          destination_dir: preview/${{ steps.slug.outputs.value }}
          keep_files: true
          commit_message: "preview: ${{ github.ref_name }} @ ${{ github.sha }}"

      - name: Find associated PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
            });
            if (prs.data.length === 0) { core.setOutput('number', ''); return; }
            core.setOutput('number', String(prs.data[0].number));

      - name: Sticky PR comment with preview URL
        if: steps.pr.outputs.number != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr.outputs.number }}
          header: pva-preview
          message: |
            🔍 **Preview deploy ready**

            Branch: `${{ github.ref_name }}`
            URL: https://${{ env.PREVIEWS_PAGES_HOST }}/preview/${{ steps.slug.outputs.value }}/
            Commit: ${{ github.sha }}

            Service-worker cache key is namespaced (`preview-${{ steps.slug.outputs.value }}-pva-cache-v…`) so this preview does not collide with the production install on your phone. Hard-reload to bust any stale cache.

            Production at `pillarbypva.app` is untouched.

            iOS/Android builds will not run until you reply `APPROVE NATIVE` in chat.
